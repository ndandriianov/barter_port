CreateChatRequest:
  type: object
  required:
    - participant_id
  properties:
    participant_id:
      type: string
      format: uuid
      description: User ID of the second participant for a direct chat

SendMessageRequest:
  type: object
  required:
    - content
  properties:
    content:
      type: string
      minLength: 1
      description: Message text
      example: Привет, давай обсудим обмен
