openapi: 3.0.3
info:
  title: Deals API
  description: Deals API
  version: 1.0.0

servers:
  - url: 'http://localhost:80'

paths:
  /deals/drafts:
    post:
      tags:
        - drafts
      summary: Создать новый черновой договор из объявлений
      description: |
        Для каждого объявления, которое должно войти в черновой договор необходимо указать список из:
        
        - `itemID` id объявления, которое должно войти в черновой договор.
        - `quantity` количество единиц товара из объявления, которое должно войти в черновой договор.
        
        В ответе придет созданный черновой договор с его `id`, который можно будет использовать для дальнейших действий
      operationId: createDraftDeal
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/requests.yaml#/CreateDraftDealRequest'
      responses:
        '201':
          description: Draft deal created
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/Draft'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: './../errorResponse.yaml#/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './../errorResponse.yaml#/ErrorResponse'
        '404':
          description: One or more items not found
          content:
            application/json:
              schema:
                $ref: './../errorResponse.yaml#/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: './../errorResponse.yaml#/ErrorResponse'


  /deals/drafts/my:
    get:
      summary: Получить ID всех черновых договоров, созданных текущим пользователем
      operationId: getMyDraftDeals
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/GetMyDraftDealsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './../errorResponse.yaml#/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: './../errorResponse.yaml#/ErrorResponse'


  /deals/drafts/{draftId}:
    get:
      summary: Получить черновой договор по его ID
      operationId: getDraftDealById
      security:
        - bearerAuth: [ ]
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/Draft'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './../errorResponse.yaml#/ErrorResponse'
        '404':
          description: Draft deal not found
          content:
            application/json:
              schema:
                $ref: './../errorResponse.yaml#/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: './../errorResponse.yaml#/ErrorResponse'