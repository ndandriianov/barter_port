openapi: 3.0.3
info:
  title: Deals API
  description: Deals API
  version: 1.0.0

servers:
  - url: 'http://localhost:80'

paths:
  /deals/drafts:
    $ref: './paths/drafts.yaml#/dealsDrafts'
  /deals/drafts/{draftId}:
    $ref: './paths/drafts.yaml#/dealsDraftsById'
  /deals/drafts/{draftId}/cancel:
    $ref: './paths/drafts.yaml#/dealsDraftsCancel'
  /deals:
    $ref: './paths/deals.yaml#/deals'
  /deals/{dealId}:
    $ref: './paths/deals.yaml#/dealById'
  /deals/{dealId}/status:
    $ref: './paths/deals.yaml#/dealStatus'
  /deals/{dealId}/items/{itemId}:
    $ref: './paths/deals.yaml#/dealItemById'
  /deals/{dealId}/items:
    $ref: './paths/deals.yaml#/dealItems'
  /deals/{dealId}/items/{itemId}/reviews:
    $ref: './paths/reviews.yaml#/dealItemReviews'
  /deals/{dealId}/joins:
    $ref: './paths/joins.yaml#/join'
  /deals/{dealId}/joins/{userId}:
    $ref: './paths/joins.yaml#/processJoinRequest'
  /deals/failures/review:
    $ref: './paths/failures.yaml#/dealFailuresReview'
  /deals/failures/{dealId}/votes:
    $ref: './paths/failures.yaml#/dealFailuresVotes'
  /deals/failures/{dealId}/materials:
    $ref: './paths/failures.yaml#/dealMaterials'
  /deals/failures/{dealId}/moderator-resolution:
    $ref: './paths/failures.yaml#/dealFailureModeratorResolution'
  /offers:
    $ref: './paths/offers.yaml#/offers'
  /offers/{offerId}:
    $ref: './paths/offers.yaml#/offerById'
  /offers/{offerId}/reviews:
    $ref: './paths/reviews.yaml#/offerReviews'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
