openapi: 3.0.3
info:
  title: Deals API
  description: Deals API
  version: 1.0.0

servers:
  - url: 'http://localhost:80'

paths:
  /deals/drafts:
    $ref: './paths/drafts.yaml#/dealsDrafts'
  /deals/drafts/{draftId}:
    $ref: './paths/drafts.yaml#/dealsDraftsById'
  /deals/drafts/{draftId}/cancel:
    $ref: './paths/drafts.yaml#/dealsDraftsCancel'
  /deals:
    $ref: './paths/deals.yaml#/deals'
  /deals/{dealId}:
    $ref: './paths/deals.yaml#/dealById'
  /deals/{dealId}/status:
    $ref: './paths/deals.yaml#/dealStatus'
  /deals/{dealId}/items/{itemId}:
    $ref: './paths/deals.yaml#/dealItemById'
  /deals/{dealId}/items:
    $ref: './paths/deals.yaml#/dealItems'
  /deals/{dealId}/items/{itemId}/reviews:
    $ref: './paths/reviews.yaml#/dealItemReviews'
  /deals/{dealId}/items/{itemId}/reviews/eligibility:
    $ref: './paths/reviews.yaml#/dealItemReviewEligibility'
  /deals/{dealId}/reviews:
    $ref: './paths/reviews.yaml#/dealReviews'
  /deals/{dealId}/reviews-pending:
    $ref: './paths/reviews.yaml#/dealPendingReviews'
  /reviews/{reviewId}:
    $ref: './paths/reviews.yaml#/reviewById'
  /authors/{authorId}/reviews:
    $ref: './paths/reviews.yaml#/authorReviews'
  /providers/{providerId}/reviews:
    $ref: './paths/reviews.yaml#/providerReviews'
  /providers/{providerId}/reviews-summary:
    $ref: './paths/reviews.yaml#/providerReviewsSummary'
  /deals/{dealId}/joins:
    $ref: './paths/joins.yaml#/join'
  /deals/{dealId}/joins/{userId}:
    $ref: './paths/joins.yaml#/processJoinRequest'
  /deals/failures/review:
    $ref: './paths/failures.yaml#/dealFailuresReview'
  /deals/failures/{dealId}/votes:
    $ref: './paths/failures.yaml#/dealFailuresVotes'
  /deals/failures/{dealId}/materials:
    $ref: './paths/failures.yaml#/dealMaterials'
  /deals/failures/{dealId}/moderator-resolution:
    $ref: './paths/failures.yaml#/dealFailureModeratorResolution'
  /offers:
    $ref: './paths/offers.yaml#/offers'
  /tags:
    $ref: './paths/tags.yaml#/tagsCollection'
  /offers/subscriptions:
    $ref: './paths/offers.yaml#/subscribedOffers'
  /offers/favorites:
    $ref: './paths/offers.yaml#/favoriteOffers'
  /offers/{offerId}:
    $ref: './paths/offers.yaml#/offerById'
  /offers/{offerId}/favorite:
    $ref: './paths/offers.yaml#/offerFavoriteById'
  /offers/{offerId}/view:
    $ref: './paths/offers.yaml#/viewOfferById'
  /offers/{offerId}/reports:
    $ref: './paths/offers.yaml#/offerReports'
  /offers/{offerId}/reviews:
    $ref: './paths/reviews.yaml#/offerReviews'
  /offers/{offerId}/reviews-summary:
    $ref: './paths/reviews.yaml#/offerReviewsSummary'
  /admin/offer-reports:
    $ref: './paths/offers.yaml#/adminOfferReports'
  /admin/offer-reports/{reportId}:
    $ref: './paths/offers.yaml#/adminOfferReportById'
  /admin/offer-reports/{reportId}/resolution:
    $ref: './paths/offers.yaml#/adminOfferReportResolution'
  /admin/tags:
    $ref: './paths/tags.yaml#/adminTags'
  /me/statistics:
    $ref: './paths/statistics.yaml#/myStatistics'
  /admin/statistics/platform:
    $ref: './paths/admin-statistics.yaml#/adminPlatformStatistics'
  /admin/users/{id}/statistics:
    $ref: './paths/admin-statistics.yaml#/adminUserStatistics'
  /offer-groups:
    $ref: './paths/offer-groups.yaml#/offerGroups'
  /offer-groups/{offerGroupId}:
    $ref: './paths/offer-groups.yaml#/offerGroupById'
  /offer-groups/{offerGroupId}/drafts:
    $ref: './paths/offer-groups.yaml#/offerGroupDrafts'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
