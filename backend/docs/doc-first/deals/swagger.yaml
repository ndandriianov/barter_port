openapi: 3.0.3
info:
  title: Deals API
  description: Deals API
  version: 1.0.0

servers:
  - url: 'http://localhost:80'

paths:
  /deals/drafts:
    $ref: './paths/deals.yaml#/~1deals~1drafts'
  /deals/drafts/my:
    $ref: './paths/deals.yaml#/~1deals~1drafts~1my'
  /deals/drafts/{draftId}:
    $ref: './paths/deals.yaml#/~1deals~1drafts~1{draftId}'
  /deals/drafts/{draftId}/cancel:
    $ref: './paths/deals.yaml#/~1deals~1drafts~1{draftId}~1cancel'
  /offers:
    $ref: './paths/offers.yaml#/~1offers'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
