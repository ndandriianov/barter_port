openapi: 3.0.3
info:
  title: Deals API
  description: Deals API
  version: 1.0.0

servers:
  - url: 'http://localhost:80'

paths:
  /deals/drafts:
    post:
      tags:
        - drafts
      summary: Создать новый черновой договор из объявлений
      description: |
        Для каждого объявления, которое должно войти в черновой договор необходимо указать список из:
        
        - `itemID` id объявления, которое должно войти в черновой договор.
        - `quantity` количество единиц товара из объявления, которое должно войти в черновой договор.
        
        В ответе придет созданный черновой договор с его `id`, который можно будет использовать для дальнейших действий
      operationId: createDraftDeal
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/requests.yaml#/CreateDraftDealRequest'
      responses:
        '201':
          description: Draft deal created
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/CreateDraftDealResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/ErrorResponse'
        '404':
          description: One or more items not found
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/ErrorResponse'


  /deals/drafts/my:
    get:
      tags:
        - drafts
      summary: Получить ID всех черновых договоров, созданных текущим пользователем
      operationId: getMyDraftDeals
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/GetMyDraftDealsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/ErrorResponse'


  /deals/drafts/{draftId}:
    get:
      tags:
        - drafts
      summary: Получить черновой договор по его ID
      operationId: getDraftDealById
      security:
        - bearerAuth: [ ]
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/Draft'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/ErrorResponse'
        '404':
          description: Draft deal not found
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/ErrorResponse'


  /items:
    get:
      tags:
        - items
      summary: List items
      description: |
        Returns a paginated list of items.

        Supported sorting modes:
        - `created_at`: newest items first
        - `popularity`: most viewed items first

        Cursor fields depend on the selected sorting mode:
        - for `created_at`: use `cursor_created_at` + `cursor_id`
        - for `popularity`: use `cursor_views` + `cursor_id`
      operationId: listItems
      security:
        - bearerAuth: []
      parameters:
        - $ref: './components/parameters.yaml#/SortType'
        - $ref: './components/parameters.yaml#/CursorCreatedAt'
        - $ref: './components/parameters.yaml#/CursorViews'
        - $ref: './components/parameters.yaml#/CursorId'
        - $ref: './components/parameters.yaml#/Limit'
      responses:
        '200':
          description: Items page
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/ListItemsResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/ErrorResponse'

    post:
      tags:
        - items
      summary: Create item
      description: Creates a new barter item
      operationId: createItem
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/requests.yaml#/CreateItemRequest'
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/Item'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
