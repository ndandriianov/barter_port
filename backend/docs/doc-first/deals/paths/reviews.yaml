reviewById:
  get:
    tags:
      - Reviews
    summary: Получить отзыв по ID
    description: |
      Возвращает один конкретный отзыв по его `reviewId`.

      Особенности:
      - `providerId` обязателен всегда;
      - комбинация `offerRef`/`itemRef` в ответе отражает один из трех типов контекста:
        `item-only`, `offer-only`, `offer+item`.
    operationId: getReviewById
    security:
      - bearerAuth: [ ]
    parameters:
      - name: reviewId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Отзыв найден
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Review'
      '400':
        description: Invalid review ID
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Отзыв не найден
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
  patch:
    tags:
      - Reviews
    summary: Обновить отзыв
    description: |
      Обновляет существующий отзыв по его `reviewId`.

      Бизнес-правила:
      - редактировать отзыв может только его автор;
      - редактирование доступно только пока связанная сделка находится в статусе `Completed`;
      - изменять можно только поля `rating` и `comment`;
      - контекст отзыва не меняется: `authorId`, `providerId`, `offerRef`, `itemRef` и тип контекста
        (`item-only`, `offer-only`, `offer+item`) после создания immutable;
      - после успешного обновления поле `updatedAt` должно быть установлено в текущее время.
    operationId: updateReview
    security:
      - bearerAuth: [ ]
    parameters:
      - name: reviewId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/requests.yaml#/UpdateReviewRequest'
    responses:
      '200':
        description: Отзыв обновлен
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Review'
      '400':
        description: |
          Некорректный запрос:
          - пустое тело запроса;
          - рейтинг вне диапазона `1..5`;
          - связанная сделка не находится в статусе `Completed`.
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: Пользователь не является автором отзыва
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Отзыв не найден
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
  delete:
    tags:
      - Reviews
    summary: Удалить отзыв
    description: |
      Удаляет существующий отзыв по его `reviewId`.

      Бизнес-правила:
      - удалить отзыв может только его автор;
      - удаление доступно только пока связанная сделка находится в статусе `Completed`;
      - удаление полностью снимает занятость соответствующего review-контекста, поэтому после этого
        автор может заново создать отзыв для того же контекста, если остальные бизнес-правила соблюдены.
    operationId: deleteReview
    security:
      - bearerAuth: [ ]
    parameters:
      - name: reviewId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Отзыв удален
      '400':
        description: |
          Некорректный запрос:
          - invalid review ID;
          - связанная сделка не находится в статусе `Completed`.
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: Пользователь не является автором отзыва
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Отзыв не найден
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



