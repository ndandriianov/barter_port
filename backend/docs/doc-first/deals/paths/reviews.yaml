offerReviews:
  get:
    tags:
      - Reviews
    summary: Получить отзывы по offer
    description: |
      Возвращает отзывы, оставленные по конкретному `offer` после завершенных сделок.

      Особенности:
      - отзывы возвращаются в порядке от новых к старым;
      - сюда попадают только отзывы, у которых заполнен `offerRef`;
      - `providerId` обязателен в каждом отзыве и указывает, кто именно фактически предоставил товар/услугу;
      - если отзыв одновременно относится и к `item`, в ответе будет заполнен `itemRef`,
        чтобы было понятно, о какой модифицированной позиции шла речь.
    operationId: getOfferReviews
    security:
      - bearerAuth: [ ]
    parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Список отзывов по offer
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/GetOfferReviewsResponse'
      '400':
        description: Invalid offer ID
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Offer not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



reviewById:
  patch:
    tags:
      - Reviews
    summary: Обновить отзыв
    description: |
      Обновляет существующий отзыв по его `reviewId`.

      Бизнес-правила:
      - редактировать отзыв может только его автор;
      - редактирование доступно только пока связанная сделка находится в статусе `Completed`;
      - изменять можно только поля `rating` и `comment`;
      - контекст отзыва не меняется: `authorId`, `providerId`, `offerRef`, `itemRef` и тип контекста
        (`item-only`, `offer-only`, `offer+item`) после создания immutable;
      - после успешного обновления поле `updatedAt` должно быть установлено в текущее время.
    operationId: updateReview
    parameters:
      - name: reviewId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    security:
      - bearerAuth: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/requests.yaml#/UpdateReviewRequest'
    responses:
      '200':
        description: Отзыв обновлен
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Review'
      '400':
        description: |
          Некорректный запрос:
          - пустое тело запроса;
          - рейтинг вне диапазона `1..5`;
          - связанная сделка не находится в статусе `Completed`.
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: Пользователь не является автором отзыва
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Отзыв не найден
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



dealItemReviews:
  get:
    tags:
      - Reviews
    summary: Получить отзывы по item
    description: |
      Возвращает отзывы, относящиеся к конкретному `item` завершенной сделки.

      Особенности:
      - отзывы возвращаются в порядке от новых к старым;
      - `providerId` обязателен в каждом отзыве и указывает, кто именно фактически предоставил товар/услугу;
      - если отзыв относится только к `item`, будет заполнен только `itemRef`;
      - если отзыв относится и к `offer`, и к `item`, в ответе будут заполнены обе ссылки.
    operationId: getDealItemReviews
    parameters:
      - name: dealId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: itemId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    security:
      - bearerAuth: [ ]
    responses:
      '200':
        description: Список отзывов по item
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/GetItemReviewsResponse'
      '400':
        description: Invalid path parameters
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Сделка или item не найдены
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
  post:
    tags:
      - Reviews
    summary: Оставить отзыв о позиции сделки
    description: |
      Оставить отзыв по `item` завершенной сделки. Конкретная цель отзыва определяется автоматически
      по полям `items.offer_id` и `items.updated_at`.

      Бизнес-правила:
      - отзыв можно оставить только если сделка находится в статусе `Completed`;
      - отзыв может оставить только пользователь, который является `items.receiver_id` для этого item;
      - `items.provider_id` должен быть заполнен; именно это значение сохраняется в `review.providerId`;
      - если `items.provider_id = items.receiver_id`, отзыв создать нельзя;
      - `authorId` в созданном отзыве всегда равен `items.receiver_id`;
      - `providerId` в созданном отзыве всегда равен `items.provider_id`;
      - один пользователь может оставить не более одного отзыва на один и тот же контекст в рамках сделки.

      При создании отзыва:
      - если `items.offer_id IS NULL`, отзыв создается только на `item`;
      - если `items.offer_id IS NOT NULL` и `items.updated_at IS NULL`, отзыв создается только на `offer`;
      - если `items.offer_id IS NOT NULL` и `items.updated_at IS NOT NULL`, отзыв создается одновременно на `offer` и `item`.

      Контекст уникальности определяется так:
      - `item-only`: `(deal_id, item_id, author_id)`;
      - `offer-only`: `(deal_id, offer_id, author_id, provider_id)`;
      - `offer+item`: `(deal_id, offer_id, item_id, author_id, provider_id)`.
    operationId: createDealItemReview
    parameters:
      - name: dealId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: itemId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    security:
      - bearerAuth: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/requests.yaml#/CreateReviewRequest'
    responses:
      '201':
        description: Отзыв создан
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Review'
      '400':
        description: |
          Некорректный запрос:
          - сделка не находится в статусе `Completed`;
          - у item не заполнен `provider_id`;
          - у item не заполнен `receiver_id`;
          - `provider_id = receiver_id`;
          - рейтинг вне диапазона `1..5`.
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: |
          Операция запрещена:
          - пользователь не является `receiver_id` этого item;
          - пользователь пытается оставить отзыв на собственный offer в кейсах, где отзыв относится к offer.
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Сделка или item не найдены
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '409':
        description: |
          Пользователь уже оставил отзыв для этого контекста в рамках данной сделки:
          - `item-only`: `(deal_id, item_id, author_id)`;
          - `offer-only`: `(deal_id, offer_id, author_id, provider_id)`;
          - `offer+item`: `(deal_id, offer_id, item_id, author_id, provider_id)`.
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
