offerReviews:
  get:
    tags:
      - Reviews
    summary: Получить отзывы по offer
    description: |
      Возвращает отзывы, оставленные по конкретному `offer` после завершенных сделок.

      Особенности:
      - отзывы возвращаются в порядке от новых к старым;
      - сюда попадают только отзывы, у которых заполнен `offerRef`;
      - `providerId` обязателен в каждом отзыве и указывает, кто именно фактически предоставил товар/услугу;
      - если отзыв одновременно относится и к `item`, в ответе будет заполнен `itemRef`,
        чтобы было понятно, о какой модифицированной позиции шла речь.
    operationId: getOfferReviews
    security:
      - bearerAuth: [ ]
    parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Список отзывов по offer
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/GetOfferReviewsResponse'
      '400':
        description: Invalid offer ID
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Offer not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



offerReviewsSummary:
  get:
    tags:
      - Reviews
    summary: Получить summary отзывов по offer
    description: |
      Возвращает агрегированную статистику отзывов по конкретному `offer`.

      Правила выборки:
      - в summary включаются только отзывы, у которых заполнен `offerRef`;
      - учитываются как `offer-only`, так и `offer+item` отзывы;
      - если отзывов нет, `count = 0`, `avgRating = 0`, а все поля breakdown равны `0`.
    operationId: getOfferReviewsSummary
    security:
      - bearerAuth: [ ]
    parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Summary отзывов по offer
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/OfferReviewsSummaryResponse'
      '400':
        description: Invalid offer ID
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Offer not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



providerReviews:
  get:
    tags:
      - Reviews
    summary: Получить отзывы по provider
    description: |
      Возвращает отзывы, где указанный пользователь выступает фактическим поставщиком товара или услуги.

      Правила выборки:
      - фильтрация выполняется строго по `review.providerId`;
      - `providerId` в каждом объекте ответа всегда совпадает со значением path-параметра `{providerId}`;
      - в выборку попадают отзывы всех трех типов контекста: `item-only`, `offer-only`, `offer+item`;
      - отзывы возвращаются в порядке от новых к старым.

      Интерпретация ссылок:
      - если отзыв относится только к `offer`, в ответе будет заполнен только `offerRef`;
      - если отзыв относится только к `item`, в ответе будет заполнен только `itemRef`;
      - если отзыв относится и к `offer`, и к `item`, в ответе будут заполнены обе ссылки.
    operationId: getProviderReviews
    security:
      - bearerAuth: [ ]
    parameters:
      - name: providerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Список отзывов по provider
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/GetProviderReviewsResponse'
      '400':
        description: Invalid provider ID
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Provider not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



