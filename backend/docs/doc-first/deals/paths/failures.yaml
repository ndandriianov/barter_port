dealFailureModeratorResolution:
  post:
    tags:
      - Failures
    summary: Решение админа по провалу сделки
    description: |
      Админ принимает решение о виновнике провала сделки в случае,
      если голоса участников распределились между несколькими кандидатами,
      либо если он не согласен с результатом голосования. Решение админа является окончательным.
      
      Админ может принять решение что сделка не провалена, тогда она переходит в статус Completed,
      если была в статусе Confirmed, в ином случае она переходит в Cancelled
      
      Эндпоинт предназначен для использования только админом. Остальным возвращает 403
    operationId: moderatorResolutionForFailure
    parameters:
      - name: dealId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/requests.yaml#/ModeratorResolutionForFailureRequest'
    security:
      - bearerAuth: [ ]
    responses:
      '200':
        description: Решение админа успешно учтено
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/DealFailureModeratorResolution'
      '400':
        description: Некорректный запрос (пустое тело)
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: |
          Операция запрещена по бизнес-правилам: сделка уже отменена/завершена,
          либо пользователь не является админом
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Сделка не найдена
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'


  get:
    tags:
      - Failures
    summary: Получить решение админа по провалу сделки
    description: |
      Получить решение админа по провалу сделки могут только участники сделки и админ
    operationId: getModeratorResolutionForFailure
    parameters:
      - name: dealId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    security:
      - bearerAuth: [ ]
    responses:
      '200':
        description: Решение админа успешно получено
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/DealFailureModeratorResolution'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: |
          Операция запрещена по бизнес-правилам: сделка уже отменена/завершена,
          либо пользователь не является участником сделки и не является админом
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Сделка не найдена
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'