offers:
  get:
    tags:
      - offers
    summary: List offers
    description: |
      Returns a paginated list of offers.
      
      - If `my=true`, only offers created by the current user are returned.
      
      Supported sorting modes:
      - `created_at`: newest offers first
      - `popularity`: most viewed offers first
      
      Cursor fields depend on the selected sorting mode:
      - for `created_at`: use `cursor_created_at` + `cursor_id`
      - for `popularity`: use `cursor_views` + `cursor_id`
    operationId: listOffers
    security:
      - bearerAuth: [ ]
    parameters:
      - name: my
        in: query
        required: false
        description: False by default. If true, returns only offers created by the current user.
        schema:
          type: boolean
      - $ref: '../components/parameters.yaml#/SortType'
      - $ref: '../components/parameters.yaml#/CursorCreatedAt'
      - $ref: '../components/parameters.yaml#/CursorViews'
      - $ref: '../components/parameters.yaml#/CursorId'
      - $ref: '../components/parameters.yaml#/Limit'
    responses:
      '200':
        description: Offers page
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ListOffersResponse'
      '400':
        description: Invalid query parameters
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'

  post:
    tags:
      - offers
    summary: Create offer
    description: Creates a new barter offer
    operationId: createOffers
    security:
      - bearerAuth: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/requests.yaml#/CreateOfferRequest'
    responses:
      '201':
        description: Offers created
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Offer'
      '400':
        description: Invalid request body
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'