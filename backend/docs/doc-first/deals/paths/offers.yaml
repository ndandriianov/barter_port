offers:
  get:
    tags:
      - offers
    summary: Список объявлений
    description: |
      Возвращает список объявлений с пагинацией.
      
      - Если `my=true`, возвращаются только объявления, созданные текущим пользователем.
      - Скрытые объявления не показываются обычным пользователям.
      - Скрытые объявления видны:
        - автору объявления (в режиме `my=true`);
        - администраторам.
      
      Поддерживаемые режимы сортировки:
      - `ByTime`: сначала новые объявления
      - `ByPopularity`: сначала самые просматриваемые объявления
      - `ByDistance`: сначала ближайшие объявления к точке `user_lat` / `user_lon`
      
      Поля курсора зависят от выбранного режима сортировки:
      - для `ByTime`: используйте `cursor_created_at` + `cursor_id`
      - для `ByPopularity`: используйте `cursor_views` + `cursor_id`
      - для `ByDistance`: используйте `cursor_distance` + `cursor_id`

      Фильтрация по тегам:
      - `tags`: вернуть объявления, содержащие **все** указанные теги;
      - `withoutTags=true`: вернуть только объявления без тегов;
      - `tags` и `withoutTags=true` одновременно передавать нельзя.

      Геолокация:
      - поля `latitude` и `longitude` возвращаются в каждом объекте `offer` всегда,
        независимо от того, указал ли текущий пользователь свою точку;
      - если у объявления точка не указана, `latitude` и `longitude` равны `null`;
      - при `sort=ByDistance` обязательны `user_lat` и `user_lon`; в этом режиме
        `distanceMeters` возвращается для каждого объявления с координатами и считается от переданной точки;
      - в остальных режимах `distanceMeters` возвращается только если у текущего пользователя сохранена текущая точка через users API
        и у объявления указаны `latitude` и `longitude`.
    operationId: listOffers
    security:
      - bearerAuth: [ ]
    parameters:
      - name: my
        in: query
        required: false
        description: |
          По умолчанию `false`. Если `true`, возвращаются только объявления, созданные текущим пользователем,
          включая скрытые.
          
          Если `false`, возвращаются все объявления, видимые текущему пользователю.
        schema:
          type: boolean
      - $ref: '../components/parameters.yaml#/SortType'
      - $ref: '../components/parameters.yaml#/CursorCreatedAt'
      - $ref: '../components/parameters.yaml#/CursorDistance'
      - $ref: '../components/parameters.yaml#/CursorViews'
      - $ref: '../components/parameters.yaml#/CursorId'
      - $ref: '../components/parameters.yaml#/Limit'
      - $ref: '../components/parameters.yaml#/UserLat'
      - $ref: '../components/parameters.yaml#/UserLon'
      - $ref: '../components/parameters.yaml#/OfferTagsFilter'
      - $ref: '../components/parameters.yaml#/WithoutTags'
    responses:
      '200':
        description: Список объявлений и (опционально) курсор
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ListOffersResponse'
      '400':
        description: Некорректные параметры запроса
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'

  post:
    tags:
      - offers
    summary: Создать объявление
    description: |
      Создаёт новое объявление для бартера.

      Пользователь может опционально передать `latitude` и `longitude` точки объявления.
      Если точка не передана, объявление создаётся без координат.
    operationId: createOffers
    security:
      - bearerAuth: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/requests.yaml#/CreateOfferRequest'
        multipart/form-data:
          schema:
            $ref: '../components/requests.yaml#/CreateOfferRequest'
    responses:
      '201':
        description: Объявление создано
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Offer'
      '400':
        description: Некорректное тело запроса
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



subscribedOffers:
  get:
    tags:
      - offers
      - subscriptions
    summary: Список объявлений от подписок
    description: |
      Возвращает список объявлений с пагинацией, на которые подписан текущий пользователь.

      Список сортируется по времени последнего обновления объявления.

      Поддерживаются те же режимы сортировки, что и для общего списка объявлений.
      Для `sort=ByDistance` обязательны `user_lat` и `user_lon`, а курсор строится по `cursor_distance` + `cursor_id`.

      Если выбран `sort=ByDistance`, `distanceMeters` считается от переданной точки.
      В остальных режимах, если у текущего пользователя сохранена текущая точка через users API,
      а у объявления указаны `latitude` и `longitude`,
      в объекте `offer` возвращается `distanceMeters` в метрах.
      Сами поля `latitude` и `longitude` возвращаются всегда.
    operationId: listSubscribedOffers
    security:
      - bearerAuth: [ ]
    parameters:
      - $ref: '../components/parameters.yaml#/SortType'
      - $ref: '../components/parameters.yaml#/CursorCreatedAt'
      - $ref: '../components/parameters.yaml#/CursorDistance'
      - $ref: '../components/parameters.yaml#/CursorViews'
      - $ref: '../components/parameters.yaml#/CursorId'
      - $ref: '../components/parameters.yaml#/Limit'
      - $ref: '../components/parameters.yaml#/UserLat'
      - $ref: '../components/parameters.yaml#/UserLon'
    responses:
      '200':
        description: Страница подписанных объявлений
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ListOffersResponse'
      '400':
        description: Некорректные параметры запроса
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



favoriteOffers:
  get:
    tags:
      - offers
      - favorites
    summary: Список избранных объявлений
    description: |
      Возвращает список объявлений, которые текущий пользователь добавил в избранное.

      Список сортируется по времени добавления в избранное: сначала новые.

      Применяются обычные правила видимости объявлений:
      - если объявление скрыто и недоступно текущему пользователю, оно не возвращается;
      - если объявление было удалено, запись в избранном удаляется каскадно.

      Если у текущего пользователя сохранена текущая точка через users API,
      а у объявления указаны `latitude` и `longitude`,
      в объекте `offer` возвращается `distanceMeters` в метрах.
      Сами поля `latitude` и `longitude` возвращаются всегда.
    operationId: listFavoriteOffers
    security:
      - bearerAuth: [ ]
    parameters:
      - $ref: '../components/parameters.yaml#/CursorFavoritedAt'
      - $ref: '../components/parameters.yaml#/CursorId'
      - $ref: '../components/parameters.yaml#/Limit'
    responses:
      '200':
        description: Страница избранных объявлений
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ListFavoriteOffersResponse'
      '400':
        description: Некорректные параметры запроса
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



offerById:
  get:
    tags:
      - offers
    summary: Получить объявление по ID
    description: |
      Возвращает одно объявление по его ID.

      Правила видимости для скрытых (hidden) объявлений:
      - автор и администратор могут получить объявление;
      - остальные пользователи получают `404 Not Found`.

      Поля `latitude` и `longitude` возвращаются в ответе всегда.
      Если у текущего пользователя сохранена текущая точка через users API,
      а у объявления указаны `latitude` и `longitude`,
      в ответе также возвращается `distanceMeters` в метрах.
    operationId: getOfferById
    security:
      - bearerAuth: [ ]
    parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Offer'
      '400':
        description: Invalid offer ID
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Offer not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
  patch:
    tags:
      - offers
    summary: Обновить объявление
    description: |
      Обновляет существующее объявление. Редактировать может только автор.

      Пользователь может:
      - установить новую точку объявления, передав `latitude` и `longitude`;
      - удалить точку объявления, передав `latitude: null` и `longitude: null`.
    operationId: updateOfferById
    security:
      - bearerAuth: [ ]
    parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/requests.yaml#/UpdateOfferRequest'
        multipart/form-data:
          schema:
            $ref: '../components/requests.yaml#/UpdateOfferRequest'
    responses:
      '200':
        description: Объявление обновлено
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Offer'
      '400':
        description: Некорректное тело запроса
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: Доступ запрещён
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Offer not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
  delete:
    tags:
      - offers
    summary: Удалить объявление
    description: Удаляет существующее объявление. Удалить может только автор.
    operationId: deleteOfferById
    security:
      - bearerAuth: [ ]
    parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Offer deleted
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: Доступ запрещён
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Offer not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



offerFavoriteById:
  put:
    tags:
      - offers
      - favorites
    summary: Добавить объявление в избранное
    description: |
      Добавляет объявление в избранное текущего пользователя.

      Операция идемпотентна:
      - если объявление уже находится в избранном, сервер всё равно возвращает `204 No Content`;
      - объявление должно существовать и быть доступно текущему пользователю по обычным правилам видимости.
    operationId: addOfferToFavorites
    security:
      - bearerAuth: [ ]
    parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Объявление находится в избранном
      '400':
        description: Invalid offer ID
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Offer not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'

  delete:
    tags:
      - offers
      - favorites
    summary: Удалить объявление из избранного
    description: |
      Удаляет объявление из избранного текущего пользователя.

      Операция идемпотентна:
      - если объявления нет в избранном, сервер всё равно возвращает `204 No Content`;
      - существование самого объявления для удаления из избранного не требуется.
    operationId: removeOfferFromFavorites
    security:
      - bearerAuth: [ ]
    parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Объявление удалено из избранного
      '400':
        description: Invalid offer ID
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



viewOfferById:
  post:
    tags:
      - offers
    summary: Просмотр предложения
    description: |
      Увеличивает счетчик просмотров предложения.
      Вызывается при открытии предложения пользователем.
      Счетчик просмотров используется для сортировки по популярности.
    operationId: viewOfferById
    security:
      - bearerAuth: [ ]
    parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: OK
      '400':
        description: Invalid offer ID
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Offer not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



offerReports:
  get:
    tags:
      - offers
      - offer-reports
    summary: Получить жалобы по своему объявлению
    description: |
      Возвращает жалобы на конкретное объявление вместе со связанными `messageId`.

      Endpoint доступен:
      - автору объявления;
      - администратору.

      Обычный пользователь, который не является автором этого `offer`, доступ не получает.
    operationId: getOfferReportsByOfferId
    security:
      - bearerAuth: [ ]
    parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Жалобы по объявлению
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/OfferReportsForOfferResponse'
      '400':
        description: Invalid offer ID
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: Доступ запрещён
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Offer not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'

  post:
    tags:
      - offers
      - offer-reports
    summary: Пожаловаться на объявление
    description: |
      Создает жалобу на объявление.

      Правила:
      - пользователь не может жаловаться на собственное объявление;
      - если по объявлению уже есть `Pending`-жалоба, новая запись в `offer_reports` не создается;
      - вместо этого сообщение добавляется в `offer_reports_messages`;
      - один пользователь может приложить только одно сообщение к одному `Pending`-репорту;
      - если жалоба уже была рассмотрена, при следующем обращении создается новый `offer_report`.
    operationId: createOfferReport
    security:
      - bearerAuth: [ ]
    parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/requests.yaml#/CreateOfferReportRequest'
    responses:
      '200':
        description: Сообщение добавлено к существующей `Pending`-жалобе
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/OfferReport'
      '201':
        description: Создана новая жалоба
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/OfferReport'
      '400':
        description: Некорректное тело запроса
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: Доступ запрещён
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Offer not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '409':
        description: Пользователь уже добавил сообщение к текущей `Pending`-жалобе
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



adminOfferReports:
  get:
    tags:
      - admin
      - offer-reports
    summary: Список жалоб на объявления для модерации
    description: |
      Возвращает список жалоб на объявления для администратора.

      Если `status` не передан, возвращаются жалобы всех статусов:
      - `Pending`
      - `Accepted`
      - `Rejected`

      `status` можно использовать как опциональный фильтр.
    operationId: listOfferReportsForAdmin
    security:
      - bearerAuth: [ ]
    parameters:
      - name: status
        in: query
        required: false
        description: Необязательный фильтр по статусу. Если не указан, возвращаются все статусы.
        schema:
          $ref: '../components/schemas.yaml#/OfferReportStatus'
    responses:
      '200':
        description: Список  жалоб на объявления
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ListOfferReportsResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: Admin only
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



adminOfferReportById:
  get:
    tags:
      - admin
      - offer-reports
    summary: Получить детали жалобы на объявление
    description: |
      Возвращает карточку жалобы для администратора:
      - сам `offer`;
      - сведения о жалобе;
      - список связанных `messageId`.
    operationId: getOfferReportByIdForAdmin
