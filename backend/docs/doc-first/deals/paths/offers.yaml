offers:
  get:
    tags:
      - offers
    summary: Список объявлений
    description: |
      Возвращает список объявлений с пагинацией.
      
      - Если `my=true`, возвращаются только объявления, созданные текущим пользователем.
      - Скрытые объявления не показываются обычным пользователям.
      - Скрытые объявления видны:
        - автору объявления (в том числе в режиме `my=true`);
        - администраторам.
      
      Поддерживаемые режимы сортировки:
      - `created_at`: сначала новые объявления
      - `popularity`: сначала самые просматриваемые объявления
      
      Поля курсора зависят от выбранного режима сортировки:
      - для `created_at`: используйте `cursor_created_at` + `cursor_id`
      - для `popularity`: используйте `cursor_views` + `cursor_id`
    operationId: listOffers
    security:
      - bearerAuth: [ ]
    parameters:
      - name: my
        in: query
        required: false
        description: |
          По умолчанию `false`. Если `true`, возвращаются только объявления, созданные текущим пользователем,
          включая скрытые.
          
          Если `false`, возвращаются все объявления, видимые текущему пользователю.
        schema:
          type: boolean
      - $ref: '../components/parameters.yaml#/SortType'
      - $ref: '../components/parameters.yaml#/CursorCreatedAt'
      - $ref: '../components/parameters.yaml#/CursorViews'
      - $ref: '../components/parameters.yaml#/CursorId'
      - $ref: '../components/parameters.yaml#/Limit'
    responses:
      '200':
        description: Список объявлений и (опционально) курсор
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ListOffersResponse'
      '400':
        description: Некорректные параметры запроса
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'

  post:
    tags:
      - offers
    summary: Создать объявление
    description: Создаёт новое объявление для бартера
    operationId: createOffers
    security:
      - bearerAuth: [ ]
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '../components/requests.yaml#/CreateOfferRequest'
    responses:
      '201':
        description: Объявление создано
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Offer'
      '400':
        description: Некорректное тело запроса
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



subscribedOffers:
  get:
    tags:
      - offers
      - subscriptions
    summary: Список объявлений от подписок
    description: |
      Возвращает список объявлений с пагинацией, на которые подписан текущий пользователь.

      Список сортируется по времени последнего обновления объявления.
    operationId: listSubscribedOffers
    security:
      - bearerAuth: [ ]
    parameters:
      - $ref: '../components/parameters.yaml#/SortType'
      - $ref: '../components/parameters.yaml#/CursorCreatedAt'
      - $ref: '../components/parameters.yaml#/CursorViews'
      - $ref: '../components/parameters.yaml#/CursorId'
      - $ref: '../components/parameters.yaml#/Limit'
    responses:
      '200':
        description: Страница подписанных объявлений
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ListOffersResponse'
      '400':
        description: Некорректные параметры запроса
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



offerById:
  get:
    tags:
      - offers
    summary: Получить объявление по ID
    description: |
      Возвращает одно объявление по его ID.

      Правила видимости для скрытых (hidden) объявлений:
      - автор и администратор могут получить объявление;
      - остальные пользователи получают `404 Not Found`.
    operationId: getOfferById
    security:
      - bearerAuth: [ ]
    parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Offer'
      '400':
        description: Invalid offer ID
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Offer not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
  patch:
    tags:
      - offers
    summary: Обновить объявление
    description: Обновляет существующее объявление. Редактировать может только автор.
    operationId: updateOfferById
    security:
      - bearerAuth: [ ]
    parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/requests.yaml#/UpdateOfferRequest'
        multipart/form-data:
          schema:
            $ref: '../components/requests.yaml#/UpdateOfferRequest'
    responses:
      '200':
        description: Объявление обновлено
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Offer'
      '400':
        description: Некорректное тело запроса
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: Доступ запрещён
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Offer not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
  delete:
    tags:
      - offers
    summary: Удалить объявление
    description: Удаляет существующее объявление. Удалить может только автор.
    operationId: deleteOfferById
    security:
      - bearerAuth: [ ]
    parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Offer deleted
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: Доступ запрещён
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Offer not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



viewOfferById:
  post:
    tags:
      - offers
    summary: Просмотр предложения
    description: |
      Увеличивает счетчик просмотров предложения.
      Вызывается при открытии предложения пользователем.
      Счетчик просмотров используется для сортировки по популярности.
    operationId: viewOfferById
    security:
      - bearerAuth: [ ]
    parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: OK
      '400':
        description: Invalid offer ID
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Offer not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



offerReports:
  get:
    tags:
      - offers
      - offer-reports
    summary: Получить жалобы по своему объявлению
    description: |
      Возвращает жалобы на конкретное объявление вместе со связанными `messageId`.

      Endpoint доступен:
      - автору объявления;
      - администратору.

      Обычный пользователь, который не является автором этого `offer`, доступ не получает.
    operationId: getOfferReportsByOfferId
    security:
      - bearerAuth: [ ]
    parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Жалобы по объявлению
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/OfferReportsForOfferResponse'
      '400':
        description: Invalid offer ID
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: Доступ запрещён
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Offer not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'

  post:
    tags:
      - offers
      - offer-reports
    summary: Пожаловаться на объявление
    description: |
      Создает жалобу на объявление.

      Правила:
      - пользователь не может жаловаться на собственное объявление;
      - если по объявлению уже есть `Pending`-жалоба, новая запись в `offer_reports` не создается;
      - вместо этого сообщение добавляется в `offer_reports_messages`;
      - один пользователь может приложить только одно сообщение к одному `Pending`-репорту;
      - если жалоба уже была рассмотрена, при следующем обращении создается новый `offer_report`.
    operationId: createOfferReport
    security:
      - bearerAuth: [ ]
    parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/requests.yaml#/CreateOfferReportRequest'
    responses:
      '200':
        description: Сообщение добавлено к существующей `Pending`-жалобе
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/OfferReport'
      '201':
        description: Создана новая жалоба
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/OfferReport'
      '400':
        description: Некорректное тело запроса
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: Доступ запрещён
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Offer not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '409':
        description: Пользователь уже добавил сообщение к текущей `Pending`-жалобе
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



adminOfferReports:
  get:
    tags:
      - admin
      - offer-reports
    summary: Список жалоб на объявления для модерации
    description: |
      Возвращает список жалоб на объявления для администратора.

      Если `status` не передан, возвращаются жалобы всех статусов:
      - `Pending`
      - `Accepted`
      - `Rejected`

      `status` можно использовать как опциональный фильтр.
    operationId: listOfferReportsForAdmin
    security:
      - bearerAuth: [ ]
    parameters:
      - name: status
        in: query
        required: false
        description: Необязательный фильтр по статусу. Если не указан, возвращаются все статусы.
        schema:
          $ref: '../components/schemas.yaml#/OfferReportStatus'
    responses:
      '200':
        description: Список  жалоб на объявления
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ListOfferReportsResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: Admin only
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



adminOfferReportById:
  get:
    tags:
      - admin
      - offer-reports
    summary: Получить детали жалобы на объявление
    description: |
      Возвращает карточку жалобы для администратора:
      - сам `offer`;
      - сведения о жалобе;
      - список связанных `messageId`.
    operationId: getOfferReportByIdForAdmin
    security:
      - bearerAuth: [ ]
    parameters:
      - name: reportId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Детали жалобы на объявление
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/OfferReportDetailsResponse'
      '400':
        description: Invalid report ID
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: Admin only
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Report not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



adminOfferReportResolution:
  post:
    tags:
      - admin
      - offer-reports
    summary: Resolve offer report
    description: |
      Позволяет администратору принять или отклонить жалобу.

      Если жалоба принята:
      - объявление скрывается;
      - автор объявления получает штраф `-10`;
      - событие для штрафа пишется в outbox таблицу.

      Если жалоба отклонена:
      - объявление остается видимым;
      - жалоба только помечается как `Rejected`.
    operationId: resolveOfferReportForAdmin
    security:
      - bearerAuth: [ ]
    parameters:
      - name: reportId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/requests.yaml#/ResolveOfferReportRequest'
    responses:
      '200':
        description: Report resolved
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/OfferReport'
      '400':
        description: Некорректное тело запроса
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: Admin only
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Report not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '409':
        description: Report already resolved
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
