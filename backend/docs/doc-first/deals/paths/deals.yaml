deals:
  get:
    tags:
      - Deals
    summary: Получить список доступных сделок
    description: |
      Возвращает список сделок, доступных текущему пользователю.

      Признак администратора определяется сервером по Bearer JWT. Клиент не передает роль или `adminId` в запросе.

      Правила доступа:
      - администратор может просматривать все сделки;
      - не-администратор может просматривать все сделки в статусе `LookingForParticipants`;
      - не-администратор может просматривать сделки в остальных статусах только если его `userId` входит в `participants`.

      Правила фильтрации:
      - `my=true` возвращает только сделки, в которых текущий пользователь является участником;
      - `open=true` возвращает только сделки в статусе `LookingForParticipants`;
      - если указаны оба параметра, возвращается пересечение фильтров доступа и параметров запроса.

      Для каждой сделки также возвращается список `items` с их фотографиями.
    operationId: getDeals
    parameters:
      - name: my
        in: query
        description: False by default. Если true, возвращает только сделки, в которых текущий пользователь является участником
        required: false
        schema:
          type: boolean
      - name: open
        in: query
        description: False by default. Если true, возвращает только сделки в статусе `LookingForParticipants`
        required: false
        schema:
          type: boolean
    security:
      - bearerAuth: [ ]
    responses:
      '200':
        description: Список сделок, доступных текущему пользователю
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/GetDealsResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'


dealItemById:
  patch:
    tags:
      - Deals
    summary: Редактировать позицию сделки
    description: |
      Редактировать позицию сделки.

      - Редактирование доступно только в статусах `LookingForParticipants` и `Discussion`.
      - Поля `name`, `description`, `quantity` может менять только автор позиции (`author_id`).
      - Роли `provider`/`receiver` можно claim/release по бизнес-правилам.
      - Если по сделке уже создана запись в `deal_failures` и она ожидает решения админа, редактирование позиции запрещено.
    operationId: updateDealItem
    parameters:
      - name: dealId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: itemId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    security:
      - bearerAuth: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/UpdateDealItemRequest'
        multipart/form-data:
          schema:
            $ref: '../components/schemas.yaml#/UpdateDealItemRequest'
    responses:
      '200':
        description: Обновлённая позиция сделки
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Item'
      '400':
        description: |
          Некорректный запрос:
          - пустое тело запроса;
          - сделка не находится в статусе `LookingForParticipants` или `Discussion`.
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: |
          Операция запрещена по бизнес-правилам:
          - пользователь не является автором позиции при изменении контентных полей;
          - роль уже занята другим пользователем;
          - пользователь не владеет ролью при release;
          - пользователь уже занимает другую роль (`provider`/`receiver`) для этой же позиции;
          - по сделке уже создана запись в `deal_failures`, ожидающая решения админа.
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Сделка или позиция не найдена
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'


dealById:
  patch:
    tags:
      - Deals
    summary: Обновить название сделки
    description: Обновить название сделки. Только участники сделки могут изменять её название.
    operationId: updateDeal
    parameters:
      - name: dealId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    security:
      - bearerAuth: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/requests.yaml#/UpdateDealRequest'
    responses:
      '200':
        description: Обновлённая сделка
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Deal'
      '400':
        description: Некорректный запрос
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: Пользователь не является участником сделки
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Сделка не найдена
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
  get:
    tags:
      - Deals
    summary: Получить сделку по ID
    description: |
      Возвращает сделку по ID, если она доступна текущему пользователю.

      Признак администратора определяется сервером по Bearer JWT. Клиент не передает роль или `adminId` в запросе.

      Правила доступа:
      - администратор может получить любую сделку;
      - не-администратор может получить сделку в статусе `LookingForParticipants`;
      - не-администратор может получить сделку в любом другом статусе только если его `userId` входит в `participants`.
    operationId: getDealById
    parameters:
      - name: dealId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    security:
      - bearerAuth: [ ]
    responses:
      '200':
        description: Сделка доступна текущему пользователю
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Deal'
      '400':
        description: Invalid deal ID
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Сделка не найдена или недоступна текущему пользователю
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



dealStatus:
  patch:
    tags:
      - Deals
    summary: Подтвердить/Отменить сделку
    description: |
      Запросить переход к следующему статусу сделки.
      Когда все пользователи указали один и тот же статус сделки (вперед), то выполняется переход к новому статусу.
      Сделка должна быть в статусе, предшествующем указанному.
      Если пользователь выбирает статус отмены, то сделка сразу же переходит в статус отменён.
      Статус Failed не может быть установлен через этот эндпоинт.

      Начисление репутации:
      - при фактическом переходе сделки в статус `Completed` каждому участнику сделки начисляются очки репутации;
      - количество очков берётся из `reputation.deal_completion_reward_points`;
      - начисление выполняется асинхронно: `deals` пишет событие в `reputation_events_outbox`, далее оно доставляется в `users` через Kafka;
      - начисление должно быть идемпотентным и происходить не более одного раза на пару `(dealId, userId)`.
      
      Если по сделке уже создана запись в `deal_failures` и она ожидает решения админа,
      менять статус сделки через этот эндпоинт нельзя.
    operationId: ChangeDealStatus
    parameters:
      - name: dealId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    security:
      - bearerAuth: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/requests.yaml#/ChangeDealStatusRequest'
    responses:
      '200':
        description: Запрос обработан, возвращает обновлённую сделку
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Deal'
      '400':
        description: Некорректный запрос (например, сделка не в том статусе)
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: |
          Операция запрещена по бизнес-правилам
          (пользователь не является участником сделки, либо голосовал за Failed,
          либо по сделке уже создана запись в `deal_failures`, ожидающая решения админа)
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Deal not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'


  get:
    tags:
      - Deals
    summary: Получить список голосов за переход к следующему статусу сделки
    operationId: GetDealStatusVotes
    parameters:
      - name: dealId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    security:
      - bearerAuth: [ ]
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/GetDealStatusVotesResponse'
      '400':
        description: Invalid deal ID
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Deal not found
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'



dealItems:
  post:
    tags:
      - Deals
    summary: Добавить позицию в сделку
    description: |
      Пользователь указывает id одного из своих offers, на основании offer формируется item, item добавляется в сделку.
      Фотографии offer копируются в item, после чего item использует уже собственные фотографии.

      Если по сделке уже создана запись в `deal_failures` и она ожидает решения админа,
      добавление новой позиции запрещено.
    operationId: addDealItem
    parameters:
      - name: dealId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    security:
      - bearerAuth: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/requests.yaml#/AddDealItemRequest'
    responses:
      '200':
        description: Новая позиция сделки
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Deal'
      '400':
        description: Некорректный запрос (пустое тело)
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '403':
        description: |
          Операция запрещена по бизнес-правилам:
          сделка не в статусе LookingForParticipants, либо пользователь не является участником сделки,
          либо по сделке уже создана запись в `deal_failures`, ожидающая решения админа
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
      '404':
        description: Сделка не найдена
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/ErrorResponse'
