ErrorResponse:
  type: object
  properties:
    message:
      type: string
      example: Вы отправили некорректный запрос



CreateDraftDealResponse:
  type: object
  required:
    - id
  properties:
    id:
      type: string
      format: uuid
      description: The unique identifier of the created draft deal



GetMyDraftDealsResponse:
  type: object
  properties:
    data:
      type: array
      items:
        type: string
        format: uuid
        description: The unique identifier of a draft deal



ListOffersResponse:
  type: object
  required:
    - offers
  properties:
    offers:
      type: array
      description: List of offers
      items:
        $ref: 'schemas.yaml#/Offer'
    nextCursor:
      nullable: true
      allOf:
        - $ref: 'schemas.yaml#/OffersCursor'
      description: Cursor for fetching the next page; null if there is no next page



ConfirmDraftDealResponse:
  type: object
  required:
    - users
  properties:
    users:
      type: array
      description: Список пользователей, которые подтвердили/не подтвердили свое участие в сделке
      items:
        $ref: 'schemas.yaml#/UserConfirm'