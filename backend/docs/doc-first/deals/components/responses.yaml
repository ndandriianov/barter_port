ErrorResponse:
  type: object
  properties:
    message:
      type: string
      example: Вы отправили некорректный запрос



CreateDraftDealResponse:
  type: object
  required:
    - id
  properties:
    id:
      type: string
      format: uuid
      description: The unique identifier of the created draft deal



GetMyDraftDealsResponse:
  type: object
  properties:
    data:
      type: array
      items:
        type: string
        format: uuid
        description: The unique identifier of a draft deal



ListItemsResponse:
  type: object
  required:
    - items
  properties:
    items:
      type: array
      description: List of items
      items:
        $ref: 'schemas.yaml#/Item'
    nextCursor:
      nullable: true
      allOf:
        - $ref: 'schemas.yaml#/ItemsCursor'
      description: Cursor for fetching the next page; null if there is no next page



ConfirmDraftDealResponse:
  type: object
  required:
    - users
  properties:
    users:
      type: array
      description: Список пользователей, которые подтвердили/не подтвердили свое участие в сделке
      items:
        type: object
        required:
          - userId
          - confirmed
        properties:
          userId:
            type: string
            format: uuid
            description: Уникальный идентификатор пользователя
          confirmed:
            type: boolean
            description: Статус подтверждения участия пользователя в сделке
