ErrorResponse:
  type: object
  properties:
    message:
      type: string
      example: Вы отправили некорректный запрос



CreateDraftDealResponse:
  type: object
  required:
    - id
  properties:
    id:
      type: string
      format: uuid
      description: Уникальный идентификатор созданной черновой сделки



GetMyDraftDealsResponse:
  type: array
  items:
    $ref: '#/GetMyDraftDealsResponseItem'

GetMyDraftDealsResponseItem:
  type: object
  required:
    - id
    - participants
  properties:
    id:
      type: string
      format: uuid
      description: Уникальный идентификатор черновой сделки
    name:
      type: string
      description: Название черновой сделки
    participants:
      type: array
      description: Список ID всех пользователей, участвующих в этой сделке
      items:
        type: string
        format: uuid
        description: Уникальный идентификатор пользователя



ListOffersResponse:
  type: object
  required:
    - offers
  properties:
    offers:
      type: array
      description: Список объявлений
      items:
        $ref: 'schemas.yaml#/Offer'
    nextCursor:
      nullable: true
      allOf:
        - $ref: 'schemas.yaml#/OffersCursor'
      description: Курсор для получения следующей страницы; `null`, если следующей страницы нет


ListFavoriteOffersResponse:
  type: object
  required:
    - offers
  properties:
    offers:
      type: array
      description: Список избранных объявлений
      items:
        $ref: 'schemas.yaml#/FavoritedOffer'
    nextCursor:
      nullable: true
      allOf:
        - $ref: 'schemas.yaml#/FavoriteOffersCursor'
      description: Курсор для получения следующей страницы; `null`, если следующей страницы нет


ListTagsResponse:
  type: array
  items:
    $ref: 'schemas.yaml#/TagName'


ListOfferReportsResponse:
  type: array
  items:
    $ref: 'schemas.yaml#/OfferReport'


OfferReportDetailsResponse:
  $ref: 'schemas.yaml#/OfferReportDetails'


OfferReportsForOfferResponse:
  $ref: 'schemas.yaml#/OfferReportsForOffer'


ListOfferGroupsResponse:
  type: array
  items:
    $ref: 'schemas.yaml#/OfferGroup'



GetOfferReviewsResponse:
  type: array
  items:
    $ref: 'schemas.yaml#/Review'



GetItemReviewsResponse:
  type: array
  items:
    $ref: 'schemas.yaml#/Review'



GetProviderReviewsResponse:
  type: array
  items:
    $ref: 'schemas.yaml#/Review'



GetAuthorReviewsResponse:
  type: array
  items:
    $ref: 'schemas.yaml#/Review'



GetDealReviewsResponse:
  type: array
  items:
    $ref: 'schemas.yaml#/Review'



GetPendingDealReviewsResponse:
  type: array
  items:
    $ref: 'schemas.yaml#/PendingDealReview'



OfferReviewsSummaryResponse:
  $ref: 'schemas.yaml#/ReviewSummary'



ProviderReviewsSummaryResponse:
  $ref: 'schemas.yaml#/ReviewSummary'



ReviewEligibilityResponse:
  $ref: 'schemas.yaml#/ReviewEligibility'



ConfirmDraftDealResponse:
  type: object
  required:
    - users
  properties:
    users:
      type: array
      description: Список пользователей, которые подтвердили/не подтвердили свое участие в сделке
      items:
        $ref: 'schemas.yaml#/UserConfirm'



GetDealsResponse:
  type: array
  items:
    $ref: '#/GetDealsResponseItem'

GetDealsResponseItem:
  type: object
  required:
    - id
    - items
    - participants
  properties:
    id:
      type: string
      format: uuid
      description: Уникальный идентификатор сделки
    name:
      type: string
      description: Название сделки
    status:
      $ref: 'schemas.yaml#/DealStatus'
    items:
      type: array
      description: Список позиций сделки вместе с фотографиями item
      items:
        $ref: 'schemas.yaml#/Item'
    participants:
      type: array
      description: Список ID всех пользователей, участвующих в этой сделке
      items:
        type: string
        format: uuid
        description: Уникальный идентификатор пользователя



GetDealJoinRequestsResponse:
  type: array
  items:
    $ref: '#/GetDealJoinRequestsResponseItem'

GetDealJoinRequestsResponseItem:
  type: object
  required:
    - userId
    - dealId
    - voters
  properties:
    userId:
      type: string
      format: uuid
      description: Уникальный идентификатор пользователя, который хочет присоединиться к сделке
    dealId:
      type: string
      format: uuid
      description: Уникальный идентификатор сделки, к которой пользователь хочет присоединиться
    voters:
      type: array
      description: Список ID пользователей, которые поддерживают заявку на присоединение к сделке
      items:
        type: string
        format: uuid
        description: Уникальный идентификатор пользователя, который поддерживает заявку на присоединение к сделке



GetDealStatusVotesResponse:
  type: array
  items:
    $ref: '#/GetDealStatusVotesResponseItem'

GetDealStatusVotesResponseItem:
  type: object
  required:
    - userId
    - vote
  properties:
    userId:
      type: string
      format: uuid
      description: Уникальный идентификатор пользователя, который проголосовал за переход сделки в следующий статус
    vote:
      $ref: 'schemas.yaml#/DealStatus'


FailureModerationDealsResponse:
  type: array
  items:
    $ref: '#/GetDealsResponseItem'


FailureVotesResponse:
  type: array
  items:
    $ref: '#/FailureVotesResponseItem'

FailureVotesResponseItem:
  type: object
  required:
    - userId
    - vote
  properties:
    userId:
      type: string
      format: uuid
      description: Уникальный идентификатор пользователя, который проголосовал за виновника провала сделки
    vote:
      type: string
      format: uuid
      description: Идентификатор пользователя, за которого проголосовал пользователь как за виновника



MyStatisticsResponse:
  $ref: 'schemas.yaml#/MyStatistics'



FailureMaterialResponse:
  type: object
  required:
    - deal
  properties:
    deal:
      $ref: 'schemas.yaml#/Deal'
    chatId:
      type: string
      format: uuid
      description: Идентификатор чата, в котором обсуждалась сделка, если чат был создан
