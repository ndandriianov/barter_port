SortType:
  name: sort
  in: query
  required: true
  description: Режим сортировки списка объявлений
  schema:
    type: string
    enum:
      - ByTime
      - ByPopularity

CursorCreatedAt:
  name: cursor_created_at
  in: query
  required: false
  description: |
    Временная метка создания курсора в формате RFC3339.
    Используется вместе с `cursor_id`, когда `sort=created_at`.
  schema:
    type: string
    format: date-time

CursorFavoritedAt:
  name: cursor_favorited_at
  in: query
  required: false
  description: |
    Временная метка добавления объявления в избранное в формате RFC3339.
    Используется вместе с `cursor_id` для пагинации списка избранного.
  schema:
    type: string
    format: date-time

CursorViews:
  name: cursor_views
  in: query
  required: false
  description: |
    Количество просмотров в курсоре.
    Используется вместе с `cursor_id`, когда `sort=popularity`.
  schema:
    type: integer
    format: int64
    minimum: 0

CursorId:
  name: cursor_id
  in: query
  required: false
  description: |
    ID объявления в курсоре, используемый как дополнительный критерий для стабильной пагинации.
  schema:
    type: string
    format: uuid

Limit:
  name: cursor_limit
  in: query
  required: false
  description: Максимальное количество объявлений в ответе
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 10

OfferTagsFilter:
  name: tags
  in: query
  required: false
  description: |
    Фильтр по тегам. Возвращаются объявления, содержащие **все** переданные теги.
    Повторяйте параметр в query:
    `?tags=bike&tags=repair`
  schema:
    type: array
    maxItems: 5
    items:
      $ref: 'schemas.yaml#/TagName'
  style: form
  explode: true

WithoutTags:
  name: withoutTags
  in: query
  required: false
  description: |
    Если `true`, вернуть только объявления без тегов.
    Нельзя передавать вместе с `tags`.
  schema:
    type: boolean
