CreateDraftDealRequest:
  type: object
  properties:
    name:
      type: string
      description: An optional name for the draft deal
    description:
      type: string
      description: An optional description for the draft deal
    offers:
      type: array
      items:
        $ref: 'schemas.yaml#/OfferIDAndQuantity'
  required:
    - offers



CreateOfferGroupRequest:
  type: object
  required:
    - units
  properties:
    name:
      type: string
      description: |
        Необязательное название композитного объявления.
        Если не передано, сервер сформирует его автоматически из названий `offers`:
        внутри `unit` через ` и `, между `unit` через `, `.
    description:
      type: string
      description: Описание сценария обмена для всей группы
    units:
      type: array
      minItems: 1
      description: |
        Список AND-групп. Для каждой группы при отклике должен быть выбран ровно один `offer`.
        Внутри одного `unit` все `offers` должны иметь одинаковый `action`.
      items:
        $ref: 'schemas.yaml#/OfferGroupUnitInput'



CreateOfferGroupDraftRequest:
  type: object
  required:
    - selectedOfferIds
  properties:
    selectedOfferIds:
      type: array
      minItems: 1
      uniqueItems: true
      description: |
        Список выбранных `offerId`.
        Должен содержать ровно по одному `offer` из каждого `unit` указанной группы.
        Для каждого выбранного `offer` сервер создаёт запись в `draft deal` с `quantity = 1`.
      items:
        type: string
        format: uuid
    responderOfferId:
      type: string
      format: uuid
      description: |
        Необязательный `offer` пользователя, который откликается на группу.
        Сервер также добавляет его в `draft deal` с `quantity = 1`.

        Правила:

        - если во всех `unit` группы одинаковый `action`, поле обязательно
        - в этом случае `responderOfferId` должен ссылаться на `offer` текущего пользователя
          с тем же `action`
        - если в группе встречаются разные `action`, поле можно не передавать
    name:
      type: string
      description: |
        Необязательное имя черновой сделки.
        Если не передано, сервер может сгенерировать его автоматически по существующим правилам.
    description:
      type: string
      description: Необязательное описание черновой сделки.



UpdateDealRequest:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      description: Новое название сделки



CreateOfferRequest:
  type: object
  required:
    - name
    - description
    - type
    - action
  properties:
    name:
      type: string
      example: Bicycle repair
    description:
      type: string
      example: I can help fix city bikes and replace brake pads
    type:
      $ref: 'schemas.yaml#/ItemType'
    action:
      $ref: 'schemas.yaml#/OfferAction'
    photos:
      type: array
      description: |
        Необязательные фотографии объявления.
        Каждая фотография передается отдельным бинарным файлом в `multipart/form-data`.
      items:
        type: string
        format: binary



ChangeDealStatusRequest:
  type: object
  required:
    - expectedStatus
  properties:
    expectedStatus:
      $ref: 'schemas.yaml#/DealStatus'


AddDealItemRequest:
  type: object
  required:
    - offerId
    - quantity
  properties:
    offerId:
      type: string
      format: uuid
      description: |
        ID предложения, которое пользователь хочет добавить в сделку.
        Предложение должно принадлежать пользователю и быть в статусе active.
    quantity:
      type: integer
      minimum: 1
      description: |
        Количество единиц предложения, которые пользователь хочет добавить в сделку.
        Должно быть положительным числом.



CreateReviewRequest:
  type: object
  required:
    - rating
  properties:
    rating:
      type: integer
      minimum: 1
      maximum: 5
      description: Оценка по шкале от 1 до 5.
    comment:
      type: string
      description: Текстовый отзыв после завершения сделки.



UpdateReviewRequest:
  type: object
  minProperties: 1
  description: |
    Хотя бы одно поле обязательно.
    Изменять можно только содержимое отзыва: `rating` и/или `comment`.
    Поля контекста (`authorId`, `providerId`, `offerRef`, `itemRef`) не редактируются.
  properties:
    rating:
      type: integer
      minimum: 1
      maximum: 5
      description: Новая оценка по шкале от 1 до 5.
    comment:
      type: string
      description: Новый текст отзыва.



VoteForFailureRequest:
  type: object
  required:
    - userId
  properties:
    userId:
      type: string
      format: uuid
      description: ID пользователя, за которого голосует участник сделки.



ModeratorResolutionForFailureRequest:
  type: object
  required:
    - confirmed
  properties:
    confirmed:
      type: boolean
      description: |
        Подтверждение админом провала сделки.
        Если true, сделка признается проваленной.
        Если false, сделка признается не проваленной и переводится в Completed либо Cancelled в зависимости от текущего статуса.
    userId:
      type: string
      format: uuid
      description: |
        ID пользователя, которого админ признает виновным в провале сделки.
        Должен быть участником сделки.
        Используется только если confirmed = true.
    punishmentPoints:
      type: integer
      minimum: 0
      description: |
        Количество штрафных очков, которые админ назначает виновнику провала сделки.
        Должно быть неотрицательным числом.
        Разрешено только если confirmed = true.
    comment:
      type: string
      description: |
        Комментарий админа, объясняющий его решение. Может быть пустым
