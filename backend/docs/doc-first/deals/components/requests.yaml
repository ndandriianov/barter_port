CreateDraftDealRequest:
  type: object
  properties:
    name:
      type: string
      description: An optional name for the draft deal
    description:
      type: string
      description: An optional description for the draft deal
    items:
      type: array
      items:
        type: object
        required:
          - itemID
          - quantity
        properties:
          itemID:
            type: string
            format: uuid
            description: The ID of the item to include in the draft deal
          quantity:
            type: integer
            description: The quantity of the item to include in the draft deal
          receiverID:
            type: string
            format: uuid
            description: |
              The ID of the user who will receive this item in the deal.
              If not provided, it is assumed that the item is offered by the current user
              and any of other participants may choose to be a receiver.
  required:
    - items



CreateItemRequest:
  type: object
  required:
    - name
    - description
    - type
    - action
  properties:
    name:
      type: string
      example: Bicycle repair
    description:
      type: string
      example: I can help fix city bikes and replace brake pads
    type:
      $ref: 'schemas.yaml#/ItemType'
    action:
      $ref: 'schemas.yaml#/ItemAction'