openapi: 3.0.4
info:
  title: Items API
  description: Items API
  version: 1.0.0

servers:
  - url: 'http://localhost:80'

paths:
  /items:
    get:
      tags:
        - items
      summary: List items
      description: |
        Returns a paginated list of items.

        Supported sorting modes:
        - `created_at`: newest items first
        - `popularity`: most viewed items first

        Cursor fields depend on the selected sorting mode:
        - for `created_at`: use `cursor_created_at` + `cursor_id`
        - for `popularity`: use `cursor_views` + `cursor_id`
      operationId: listItems
      security:
        - bearerAuth: []
      parameters:
        - $ref: './components/parameters.yaml#/SortType'
        - $ref: './components/parameters.yaml#/CursorCreatedAt'
        - $ref: './components/parameters.yaml#/CursorViews'
        - $ref: './components/parameters.yaml#/CursorId'
        - $ref: './components/parameters.yaml#/Limit'
      responses:
        '200':
          description: Items page
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/ListItemsResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/ErrorResponse'

    post:
      tags:
        - items
      summary: Create item
      description: Creates a new barter item
      operationId: createItem
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/schemas.yaml#/CreateItemRequest'
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/Item'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
