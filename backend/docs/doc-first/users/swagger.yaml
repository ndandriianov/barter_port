openapi: 3.0.3
info:
  title: Users API
  description: Users API
  version: 1.0.0

servers:
  - url: 'http://localhost:80'

paths:
  /users/subscriptions:
    $ref: './paths/subscriptions.yaml#/subscription'
  /users/subscribers:
    $ref: './paths/subscriptions.yaml#/subscribers'
  /users/me:
    get:
      tags:
        - users, me
      summary: Получить информацию о себе
      description: |
        Возвращает информацию о текущем пользователе.
        Обращается к auth сервису для получения email, createdAt и признака admin.
        Также возвращает текущий рейтинг пользователя (`reputationPoints`).
      operationId: getCurrentUser
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Информация о пользователе
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/GetMeResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ErrorResponse'

    patch:
      tags:
        - users, me
      summary: Редактировать информацию о себе
      description: |
        Позволяет отредактировать имя или биографию текущего пользователя.
      operationId: updateCurrentUser
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/requests.yaml#/UpdateUserRequest'
      responses:
        '200':
          description: Информация о пользователе после обновления
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/GetMeResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ErrorResponse'

  /users/me/avatar:
    post:
      tags:
        - users, me
      summary: Загрузить аватар текущего пользователя
      description: |
        Принимает файл изображения, загружает его в S3-совместимое хранилище
        и возвращает публичный URL, который затем можно сохранить в профиле.
      operationId: uploadCurrentUserAvatar
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Публичный URL загруженного аватара
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/UploadAvatarResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ErrorResponse'


  /users/{id}:
    get:
      tags:
        - users
      summary: Получить информацию о пользователе по id
      description: |
        Возвращает информацию о пользователе по его id.
        Обращается к auth сервису для получения email и createdAt.
      operationId: getUserById
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: './components/parameters.yaml#/Id'
      responses:
        '200':
          description: Информация о пользователе
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ErrorResponse'


  /users/reputation-events:
    get:
      tags:
        - users
      summary: Получить события изменения репутации текущего пользователя
      description: |
        Возвращает список событий, связанных с изменением репутации текущего пользователя.
        Каждое событие содержит информацию о том, что произошло, сколько очков репутации было добавлено или отнято,
        и когда это произошло.
      operationId: getCurrentUserReputationEvents
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Список событий изменения репутации
          content:
            application/json:
              schema:
                $ref: './components/responses.yaml#/GetReputationEventsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ErrorResponse'



components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
