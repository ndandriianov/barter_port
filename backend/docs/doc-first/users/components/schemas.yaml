Me:
  type: object
  required:
    - id
    - email
    - createdAt
    - isAdmin
    - reputationPoints
  properties:
    id:
      $ref: './properties.yaml#/UserId'
    email:
      type: string
      format: email
      description: User email
      example: 'email@example.com'
    createdAt:
      type: string
      format: date-time
      description: User registration timestamp
      example: '2026-03-04T12:00:00Z'
    isAdmin:
      type: boolean
      description: Whether the current user has admin access
      example: false
    name:
      $ref: './properties.yaml#/Name'
    bio:
      $ref: './properties.yaml#/Bio'
    avatarUrl:
      $ref: './properties.yaml#/AvatarUrl'
    phoneNumber:
      $ref: './properties.yaml#/PhoneNumber'
    reputationPoints:
      $ref: './properties.yaml#/ReputationPoints'
    currentLatitude:
      allOf:
        - $ref: './properties.yaml#/Latitude'
      nullable: true
      description: |
        Текущая точка пользователя.
        `null`, если пользователь ещё не сохранял свою точку или очистил её.
    currentLongitude:
      allOf:
        - $ref: './properties.yaml#/Longitude'
      nullable: true
      description: |
        Текущая точка пользователя.
        `null`, если пользователь ещё не сохранял свою точку или очистил её.

AvatarUploadResponse:
  type: object
  required:
    - avatarUrl
  properties:
    avatarUrl:
      $ref: './properties.yaml#/AvatarUrl'

User:
  type: object
  required:
    - id
  properties:
    id:
      $ref: './properties.yaml#/UserId'
    name:
      $ref: './properties.yaml#/Name'
    bio:
      $ref: './properties.yaml#/Bio'
    avatarUrl:
      $ref: './properties.yaml#/AvatarUrl'
    phoneNumber:
      $ref: './properties.yaml#/PhoneNumber'


ReputationEvent:
  type: object
  required:
    - id
    - sourceType
    - sourceId
    - delta
    - createdAt
  properties:
    id:
      type: string
      format: uuid
      description: Уникальный идентификатор события репутации
    sourceType:
      type: string
      enum:
        - deals.offer_report.penalty
        - deals.deal_failure.responsible
        - deals.deal_completion.reward
        - deals.review_creation.reward
      description: |
        Источник изменения репутации.
    sourceId:
      type: string
      format: uuid
      description: |
        Идентификатор источника изменения репутации:
        - для `deals.offer_report.penalty` - id жалобы на оффер;
        - для `deals.deal_failure.responsible` - уникальный id события штрафа за провал сделки;
        - для `deals.deal_completion.reward` - уникальный id начисления за конкретную пару `(dealId, userId)`;
        - для `deals.review_creation.reward` - уникальный id начисления за review-контекст автора.
    delta:
      type: integer
      description: Изменение репутации (положительное или отрицательное)
    createdAt:
      type: string
      format: date-time
      description: Время изменения репутации
    comment:
      type: string
      description: Комментарий к изменению репутации (например, причина изменения или пояснение начисления)



AdminPlatformStatistics:
  type: object
  required:
    - reputation
  properties:
    reputation:
      $ref: './schemas.yaml#/AdminPlatformReputationStatistics'

AdminPlatformReputationStatistics:
  type: object
  required:
    - average
    - median
    - topUsers
  properties:
    average:
      type: number
      format: double
      description: Средняя репутация по всем пользователям
    median:
      type: number
      format: double
      description: Медианная репутация по всем пользователям
    topUsers:
      type: array
      description: Топ-N пользователей по репутации
      items:
        $ref: './schemas.yaml#/AdminTopUserByReputation'

AdminTopUserByReputation:
  type: object
  required:
    - userId
    - reputationPoints
  properties:
    userId:
      $ref: './properties.yaml#/UserId'
    name:
      $ref: './properties.yaml#/Name'
    reputationPoints:
      $ref: './properties.yaml#/ReputationPoints'

AdminUserStatistics:
  type: object
  required:
    - reputation
    - social
  properties:
    reputation:
      $ref: './schemas.yaml#/AdminUserReputationStatistics'
    social:
      $ref: './schemas.yaml#/AdminUserSocialStatistics'

AdminUserReputationStatistics:
  type: object
  required:
    - currentPoints
    - history
  properties:
    currentPoints:
      $ref: './properties.yaml#/ReputationPoints'
    history:
      type: array
      description: История начислений и штрафов пользователя
      items:
        $ref: './schemas.yaml#/ReputationEvent'

AdminUserSocialStatistics:
  type: object
  required:
    - followersCount
    - subscriptionsCount
  properties:
    followersCount:
      type: integer
      minimum: 0
      description: Число подписчиков пользователя
    subscriptionsCount:
      type: integer
      minimum: 0
      description: Число подписок пользователя
