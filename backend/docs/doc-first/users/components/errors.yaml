ErrorResponse:
  type: object
  required:
    - code
  properties:
    code:
      $ref: '#/ErrorCode'
    message:
      type: string
      example: Вы отправили некорректный запрос

ErrorCode:
  type: string
  enum:
    - INVALID_REQUEST
    - INTERNAL
  x-enum-varnames:
    - ErrorCodeInvalidRequest
    - ErrorCodeInternal
  example: INVALID_REQUEST
