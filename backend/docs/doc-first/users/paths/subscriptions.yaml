subscription:
  post:
    tags:
      - Subscriptions
    summary: Подписаться на пользователя
    description: |
      Позволяет подписаться на другого пользователя, чтобы смотреть его публикации в своей ленте.
      
      Писать другому пользователю в личные сообщения можно только при взаимной подписке.
    operationId: subscribeToUser
    security:
      - bearerAuth: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/requests.yaml#/SubscribeRequest'
    responses:
      '201':
        description: Успешная подписка
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              $ref: '../components/errors.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/errors.yaml#/ErrorResponse'
      '404':
        description: Пользователь не найден
        content:
          application/json:
            schema:
              $ref: '../components/errors.yaml#/ErrorResponse'
      '409':
        description: Конфликт - уже подписаны
        content:
          application/json:
            schema:
              $ref: '../components/errors.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/errors.yaml#/ErrorResponse'


  get:
    tags:
      - Subscriptions
    summary: Получить список подписок
    description: |
      Позволяет получить список пользователей, на которых подписан текущий пользователь.
    operationId: getSubscriptions
    security:
      - bearerAuth: [ ]
    responses:
      '200':
        description: Список подписок
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/responses.yaml#/getSubscriptionsResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/errors.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/errors.yaml#/ErrorResponse'


  delete:
    tags:
      - Subscriptions
    summary: Отписаться от пользователя
    description: |
      Позволяет отписаться от другого пользователя, чтобы больше не видеть его публикации в своей ленте.
      
      Если пользователи были взаимно подписаны, то после отписки от одного из них, нельзя инициировать чат,
      но сохраняется возможность писать друг другу в уже существующий чат.
    operationId: unsubscribeFromUser
    security:
      - bearerAuth: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/requests.yaml#/SubscribeRequest'
    responses:
      '204':
        description: Успешная отписка
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              $ref: '../components/errors.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/errors.yaml#/ErrorResponse'
      '404':
        description: Пользователь не найден
        content:
          application/json:
            schema:
              $ref: '../components/errors.yaml#/ErrorResponse'
      '409':
        description: Конфликт - не подписаны
        content:
          application/json:
            schema:
              $ref: '../components/errors.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/errors.yaml#/ErrorResponse'



subscribers:
  get:
    tags:
      - Subscriptions
    summary: Получить список подписчиков
    description: |
      Позволяет получить список пользователей, которые подписаны на текущего пользователя.
    operationId: getSubscribers
    security:
      - bearerAuth: [ ]
    responses:
      '200':
        description: Список подписчиков
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/responses.yaml#/getSubscriptionsResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/errors.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../components/errors.yaml#/ErrorResponse'