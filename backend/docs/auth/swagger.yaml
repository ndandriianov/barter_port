basePath: /
definitions:
  http_api.ErrorResponse:
    properties:
      error:
        description: The error message
        type: string
    type: object
  transport.loginReq:
    properties:
      email:
        example: user@email.com
        type: string
      password:
        example: password
        type: string
    type: object
  transport.loginResp:
    properties:
      accessToken:
        type: string
    type: object
  transport.meResp:
    properties:
      userId:
        type: string
    type: object
  transport.refreshResponse:
    properties:
      access_token:
        type: string
    type: object
  transport.registerReq:
    properties:
      email:
        example: user@email.com
        type: string
      password:
        example: password
        type: string
    type: object
  transport.registerResp:
    properties:
      email:
        type: string
      userId:
        type: string
    type: object
  transport.verifyEmailReq:
    properties:
      token:
        example: iT1VWZWO1apO2GGoXG1ahOKuHlo8WA6ESwA86WMOTiI
        type: string
    type: object
host: localhost:8081
info:
  contact: {}
  description: API for Barter Port
  title: Barter Port API
  version: 1.0.0
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Logs in a user and returns access and refresh tokens
      parameters:
      - description: Login request
        in: body
        name: loginReq
        required: true
        schema:
          $ref: '#/definitions/transport.loginReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/transport.loginResp'
        "400":
          description: Invalid request or credentials
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
        "401":
          description: Incorrect password
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
        "403":
          description: Email not verified
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
      summary: Login user
      tags:
      - auth
  /auth/logout:
    post:
      description: Logs out a user by revoking the refresh token
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
      summary: Logout user
      tags:
      - auth
  /auth/me:
    get:
      description: Retrieves information about the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/transport.meResp'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user info
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Refreshes access and refresh tokens using the refresh token
      parameters:
      - description: refresh_token=<JWT refresh token>
        in: header
        name: Cookie
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/transport.refreshResponse'
        "401":
          description: Unauthorized or invalid token
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
      summary: Refresh tokens
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Registers a new user with email and password
      parameters:
      - description: Register request
        in: body
        name: registerReq
        required: true
        schema:
          $ref: '#/definitions/transport.registerReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/transport.registerResp'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /auth/verify-email:
    post:
      consumes:
      - application/json
      description: Verifies a user's email using a token
      parameters:
      - description: Verify email request
        in: body
        name: verifyEmailReq
        required: true
        schema:
          $ref: '#/definitions/transport.verifyEmailReq'
      produces:
      - text/plain
      responses:
        "200":
          description: 'status: ok'
        "400":
          description: Invalid request or token
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
      summary: Verify email
      tags:
      - auth
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
