basePath: /
definitions:
  http_api.ErrorResponse:
    properties:
      message:
        type: string
    type: object
  infrastructure_transport_http.credentialsReq:
    properties:
      email:
        example: user@email.com
        type: string
      password:
        example: password
        type: string
    type: object
  infrastructure_transport_http.loginResp:
    properties:
      accessToken:
        type: string
    type: object
  infrastructure_transport_http.meResp:
    properties:
      userId:
        type: string
    type: object
  infrastructure_transport_http.refreshResponse:
    properties:
      access_token:
        type: string
    type: object
  infrastructure_transport_http.registerResp:
    properties:
      email:
        type: string
      userId:
        type: string
    type: object
  infrastructure_transport_http.userCreationStatusResp:
    properties:
      status:
        type: string
    type: object
  infrastructure_transport_http.verifyEmailReq:
    properties:
      token:
        example: iT1VWZWO1apO2GGoXG1ahOKuHlo8WA6ESwA86WMOTiI
        type: string
    type: object
host: localhost:80
info:
  contact: {}
  description: API for Barter Port
  title: Barter Port API
  version: 1.0.0
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Logs in a user and returns access and refresh tokens
      parameters:
      - description: Login request
        in: body
        name: credentialsReq
        required: true
        schema:
          $ref: '#/definitions/infrastructure_transport_http.credentialsReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/infrastructure_transport_http.loginResp'
        "400":
          description: Invalid request or credentialsReq
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
        "401":
          description: Incorrect password
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
        "403":
          description: Email not verified
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
        "500":
          description: Internal server error
      summary: Login user
      tags:
      - auth
  /auth/logout:
    post:
      description: Logs out a user by revoking the refresh token
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful
        "500":
          description: Internal server error
      summary: Logout user
      tags:
      - auth
  /auth/me:
    get:
      description: Retrieves information about the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/infrastructure_transport_http.meResp'
        "500":
          description: Internal server error
      security:
      - BearerAuth: []
      summary: Get user info
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Refreshes access and refresh tokens using the refresh token
      parameters:
      - description: refresh_token=<JWT refresh token>
        in: header
        name: Cookie
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/infrastructure_transport_http.refreshResponse'
        "401":
          description: Unauthorized or invalid token
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
        "500":
          description: Internal server error
      summary: Refresh tokens
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Registers a new user with email and password
      parameters:
      - description: Register request
        in: body
        name: credentialsReq
        required: true
        schema:
          $ref: '#/definitions/infrastructure_transport_http.credentialsReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/infrastructure_transport_http.registerResp'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
        "500":
          description: Internal server error
      summary: Register a new user
      tags:
      - auth
  /auth/retry-send-verification-email:
    post:
      consumes:
      - application/json
      description: Generates a new email verification token and sends a verification
        email if the user's email is not verified.
      parameters:
      - description: Retry send verification email request
        in: body
        name: credentialsReq
        required: true
        schema:
          $ref: '#/definitions/infrastructure_transport_http.credentialsReq'
      produces:
      - application/json
      responses:
        "200":
          description: Verification email sent successfully
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
        "500":
          description: Internal server error
      summary: Retry sending verification email
      tags:
      - auth
  /auth/status/{userId}:
    get:
      description: Retrieves user creation status by user ID
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/infrastructure_transport_http.userCreationStatusResp'
        "400":
          description: Invalid user ID
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
        "404":
          description: User creation event not found
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
        "500":
          description: Internal server error
      summary: Get user creation status
      tags:
      - auth
  /auth/verify-email:
    post:
      consumes:
      - application/json
      description: Verifies a user's email using a token
      parameters:
      - description: Verify email request
        in: body
        name: verifyEmailReq
        required: true
        schema:
          $ref: '#/definitions/infrastructure_transport_http.verifyEmailReq'
      produces:
      - text/plain
      responses:
        "200":
          description: 'status: ok'
        "400":
          description: Invalid request or token
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/http_api.ErrorResponse'
        "500":
          description: Internal server error
      summary: Verify email
      tags:
      - auth
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
