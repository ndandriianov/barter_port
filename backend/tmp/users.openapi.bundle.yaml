openapi: 3.0.3
info:
  title: Users API
  description: Users API
  version: 1.0.0
servers:
  - url: http://localhost:80
paths:
  /users/me:
    get:
      tags:
        - users, me
      summary: Получить информацию о себе
      description: |
        Возвращает информацию о текущем пользователе.
        Обращается к auth сервису для получения email, createdAt и признака admin.
        Также возвращает текущий рейтинг пользователя (`reputationPoints`).
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Информация о пользователе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - users, me
      summary: Редактировать информацию о себе
      description: |
        Позволяет отредактировать имя или биографию текущего пользователя.
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Информация о пользователе после обновления
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me/avatar:
    post:
      tags:
        - users, me
      summary: Загрузить аватар текущего пользователя
      description: |
        Принимает файл изображения, загружает его в S3-совместимое хранилище
        и возвращает публичный URL, который затем можно сохранить в профиле.
      operationId: uploadCurrentUserAvatar
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Публичный URL загруженного аватара
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarUploadResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{id}:
    get:
      tags:
        - users
      summary: Получить информацию о пользователе по id
      description: |
        Возвращает информацию о пользователе по его id.
        Обращается к auth сервису для получения email и createdAt.
      operationId: getUserById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Информация о пользователе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UserId:
      type: string
      format: uuid
      description: User ID
      example: 123e4567-e89b-12d3-a456-426614174000
    Name:
      type: string
      description: User name
      example: John Doe
    Bio:
      type: string
      description: User bio
      example: I am a software developer who loves bartering.
    AvatarUrl:
      type: string
      format: uri
      description: User avatar URL
      example: http://localhost:8333/avatars/user-123/avatar.jpg
    ReputationPoints:
      type: integer
      description: Current user reputation score
      example: -10
    Me:
      type: object
      required:
        - id
        - email
        - createdAt
        - isAdmin
        - reputationPoints
      properties:
        id:
          $ref: '#/components/schemas/UserId'
        email:
          type: string
          description: User email
          example: email@example.com
        createdAt:
          type: string
          format: date-time
          description: User registration timestamp
          example: '2026-03-04T12:00:00Z'
        isAdmin:
          type: boolean
          description: Whether the current user has admin access
          example: false
        name:
          $ref: '#/components/schemas/Name'
        bio:
          $ref: '#/components/schemas/Bio'
        avatarUrl:
          $ref: '#/components/schemas/AvatarUrl'
        reputationPoints:
          $ref: '#/components/schemas/ReputationPoints'
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Вы отправили некорректный запрос
    UpdateUserRequest:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/Name'
        bio:
          $ref: '#/components/schemas/Bio'
        avatarUrl:
          $ref: '#/components/schemas/AvatarUrl'
    AvatarUploadResponse:
      type: object
      required:
        - avatarUrl
      properties:
        avatarUrl:
          $ref: '#/components/schemas/AvatarUrl'
    User:
      type: object
      required:
        - id
      properties:
        id:
          $ref: '#/components/schemas/UserId'
        name:
          $ref: '#/components/schemas/Name'
        bio:
          $ref: '#/components/schemas/Bio'
        avatarUrl:
          $ref: '#/components/schemas/AvatarUrl'
  parameters:
    Id:
      name: id
      in: path
      required: true
      description: User ID
      schema:
        type: string
        format: uuid
