openapi: 3.0.3
info:
  title: Users API
  description: Users API
  version: 1.0.0
servers:
  - url: http://localhost:80
paths:
  /admin/statistics/platform:
    get:
      tags:
        - admin
        - statistics
      summary: Получить статистику платформы из users-сервиса
      description: |
        Возвращает агрегированные административные метрики, которыми владеет `users`:
        - распределение пользователей по уровням репутации
        - средняя и медианная репутация
        - топ пользователей по репутации

        Метрики регистрации и верификации email сюда не входят:
        они относятся к `auth`.

        Endpoint доступен только администратору.
      operationId: getAdminUsersPlatformStatistics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Агрегированная статистика платформы по домену users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPlatformStatistics'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Доступ только для администратора
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users:
    get:
      tags:
        - admin
        - users
      summary: Получить список пользователей для административной проверки
      description: |
        Возвращает список пользователей из `users`-сервиса для выбора в административном интерфейсе.
        Каждый элемент содержит базовые данные профиля и текущую репутацию пользователя,
        чтобы администратор мог открыть список, выбрать нужного пользователя и затем
        посмотреть его детальные метрики в соседних сервисах.

        Endpoint доступен только администратору.
      operationId: listAdminUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список пользователей для административной проверки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUsersListResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Доступ только для администратора
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users/{id}/statistics:
    get:
      tags:
        - admin
        - statistics
      summary: Получить статистику пользователя из users-сервиса
      description: |
        Возвращает административные метрики конкретного пользователя, которыми владеет `users`:
        - текущий репутационный балл
        - история начислений и штрафов
        - число подписчиков и подписок

        Endpoint доступен только администратору.
      operationId: getAdminUsersUserStatistics
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Статистика пользователя по домену users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserStatistics'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Доступ только для администратора
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/subscriptions:
    post:
      tags:
        - Subscriptions
      summary: Подписаться на пользователя
      description: |
        Позволяет подписаться на другого пользователя, чтобы смотреть его публикации в своей ленте.

        Писать другому пользователю в личные сообщения можно только при взаимной подписке.

        Если целевой пользователь уже находится в списке скрытых авторов текущего пользователя,
        подписка не создается и сервис возвращает `403`.
      operationId: subscribeToUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
      responses:
        '201':
          description: Успешная подписка
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - пользователь находится в списке скрытых авторов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Конфликт - уже подписаны
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Subscriptions
      summary: Получить список подписок
      description: |
        Позволяет получить список пользователей, на которых подписан текущий пользователь.
      operationId: getSubscriptions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список подписок
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/getSubscriptionsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Subscriptions
      summary: Отписаться от пользователя
      description: |
        Позволяет отписаться от другого пользователя, чтобы больше не видеть его публикации в своей ленте.

        Если пользователи были взаимно подписаны, то после отписки от одного из них, нельзя инициировать чат,
        но сохраняется возможность писать друг другу в уже существующий чат.
      operationId: unsubscribeFromUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
      responses:
        '204':
          description: Успешная отписка
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Конфликт - не подписаны
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/subscriptions/{id}:
    get:
      tags:
        - Subscriptions
      summary: Получить список подписок пользователя
      description: |
        Позволяет получить список пользователей, на которых подписан другой пользователь.
      operationId: getSubscriptionsByUserId
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Список подписок
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/getSubscriptionsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/subscribers:
    get:
      tags:
        - Subscriptions
      summary: Получить список своих подписчиков
      description: |
        Позволяет получить список пользователей, которые подписаны на текущего пользователя.
      operationId: getMySubscribers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список подписчиков
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/getSubscriptionsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/subscribers/{id}:
    get:
      tags:
        - Subscriptions
      summary: Получить список подписчиков пользователя
      description: |
        Позволяет получить список пользователей, которые подписаны на другого пользователя.
      operationId: getSubscribersByUserId
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Список подписчиков
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/getSubscriptionsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/hidden-users:
    post:
      tags:
        - HiddenUsers
      summary: Скрыть автора
      description: |
        Добавляет пользователя в список скрытых авторов текущего пользователя.

        После этого объявления данного автора не должны попадать в `operationId: listOffers`
        для текущего пользователя.

        Правила:
        - скрывать можно только обычным пользователям;
        - скрыть самого себя нельзя;
        - если текущий пользователь уже подписан на `targetUserId`, запрос возвращает `409`;
        - запрос идемпотентный: если пользователь уже находится в списке скрытых авторов,
          повторный вызов все равно считается успешным.
      operationId: hideUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
      responses:
        '204':
          description: Пользователь успешно добавлен в список скрытых авторов
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Администратор не может скрывать авторов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Конфликт - уже подписаны на пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - HiddenUsers
      summary: Получить список скрытых авторов
      description: |
        Возвращает список пользователей, чьи объявления скрыты от текущего пользователя.

        Endpoint доступен только обычным пользователям.
      operationId: getHiddenUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список скрытых авторов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/getSubscriptionsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Администратор не может получать список скрытых авторов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - HiddenUsers
      summary: Убрать автора из скрытых
      description: |
        Удаляет пользователя из списка скрытых авторов текущего пользователя.

        Endpoint доступен только обычным пользователям.
        Запрос идемпотентный: если пользователя нет в списке, повторный вызов
        все равно считается успешным.
      operationId: unhideUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
      responses:
        '204':
          description: Пользователь успешно удален из списка скрытых авторов
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Администратор не может скрывать авторов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me:
    get:
      tags:
        - users, me
      summary: Получить информацию о себе
      description: |
        Возвращает информацию о текущем пользователе.
        Обращается к auth сервису для получения email, createdAt и признака admin.
        Если у пользователя указан номер телефона, он также возвращается в поле `phoneNumber`.
        Также возвращает текущий рейтинг пользователя (`reputationPoints`).
        В это значение входят как штрафы, так и положительные начисления,
        включая награду за завершение сделки и за оставление отзыва.
        Если пользователь сохранил свою текущую точку, она возвращается
        в полях `currentLatitude` и `currentLongitude`.
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Информация о пользователе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - users, me
      summary: Редактировать информацию о себе
      description: |
        Позволяет отредактировать имя, биографию, аватар и номер телефона текущего пользователя.
        Также позволяет сохранить, изменить или очистить текущую точку пользователя
        через поля `currentLatitude` и `currentLongitude`.
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Информация о пользователе после обновления
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me/avatar:
    post:
      tags:
        - users, me
      summary: Загрузить аватар текущего пользователя
      description: |
        Принимает файл изображения, загружает его в S3-совместимое хранилище
        и возвращает публичный URL, который затем можно сохранить в профиле.
      operationId: uploadCurrentUserAvatar
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Публичный URL загруженного аватара
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarUploadResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{id}:
    get:
      tags:
        - users
      summary: Получить информацию о пользователе по id
      description: |
        Возвращает информацию о пользователе по его id.
        Если у пользователя указан номер телефона, он также возвращается в ответе.
      operationId: getUserById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Информация о пользователе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/reputation-events:
    get:
      tags:
        - users
      summary: Получить события изменения репутации текущего пользователя
      description: |
        Возвращает список событий, связанных с изменением репутации текущего пользователя.
        Каждое событие содержит информацию о том, что произошло, сколько очков репутации было добавлено или отнято,
        и когда это произошло.
        В список входят как штрафы, так и положительные начисления из `deals`,
        в том числе за завершение сделки и за создание отзыва.
      operationId: getCurrentUserReputationEvents
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список событий изменения репутации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetReputationEventsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UserId:
      type: string
      format: uuid
      description: User ID
      example: 123e4567-e89b-12d3-a456-426614174000
    Name:
      type: string
      description: User name
      example: John Doe
    ReputationPoints:
      type: integer
      description: Current user reputation score including rewards and penalties
      example: -10
    AdminTopUserByReputation:
      type: object
      required:
        - userId
        - reputationPoints
      properties:
        userId:
          $ref: '#/components/schemas/UserId'
        name:
          $ref: '#/components/schemas/Name'
        reputationPoints:
          $ref: '#/components/schemas/ReputationPoints'
    AdminPlatformReputationStatistics:
      type: object
      required:
        - average
        - median
        - topUsers
      properties:
        average:
          type: number
          format: double
          description: Средняя репутация по всем пользователям
        median:
          type: number
          format: double
          description: Медианная репутация по всем пользователям
        topUsers:
          type: array
          description: Топ-N пользователей по репутации
          items:
            $ref: '#/components/schemas/AdminTopUserByReputation'
    AdminPlatformStatistics:
      type: object
      required:
        - reputation
      properties:
        reputation:
          $ref: '#/components/schemas/AdminPlatformReputationStatistics'
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Вы отправили некорректный запрос
    Bio:
      type: string
      description: User bio
      example: I am a software developer who loves bartering.
    AvatarUrl:
      type: string
      format: uri
      description: User avatar URL
      example: http://localhost:8333/avatars/user-123/avatar.jpg
    PhoneNumber:
      type: string
      pattern: ^\\+7 \\(\\d{3}\\) \\d{3}-\\d{2}-\\d{2}$
      description: User phone number in format +7 (999) 123-45-67
      example: +7 (999) 123-45-67
    User:
      type: object
      required:
        - id
      properties:
        id:
          $ref: '#/components/schemas/UserId'
        name:
          $ref: '#/components/schemas/Name'
        bio:
          $ref: '#/components/schemas/Bio'
        avatarUrl:
          $ref: '#/components/schemas/AvatarUrl'
        phoneNumber:
          $ref: '#/components/schemas/PhoneNumber'
    AdminUserListItem:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          required:
            - reputationPoints
          properties:
            reputationPoints:
              $ref: '#/components/schemas/ReputationPoints'
          description: |
            Базовые данные пользователя для административного списка выбора.
    AdminUsersListResponse:
      type: array
      items:
        $ref: '#/components/schemas/AdminUserListItem'
    ReputationEvent:
      type: object
      required:
        - id
        - sourceType
        - sourceId
        - delta
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор события репутации
        sourceType:
          type: string
          enum:
            - deals.offer_report.penalty
            - deals.deal_failure.responsible
            - deals.deal_completion.reward
            - deals.review_creation.reward
          description: |
            Источник изменения репутации.
        sourceId:
          type: string
          format: uuid
          description: |
            Идентификатор источника изменения репутации:
            - для `deals.offer_report.penalty` - id жалобы на оффер;
            - для `deals.deal_failure.responsible` - уникальный id события штрафа за провал сделки;
            - для `deals.deal_completion.reward` - уникальный id начисления за конкретную пару `(dealId, userId)`;
            - для `deals.review_creation.reward` - уникальный id начисления за review-контекст автора.
        delta:
          type: integer
          description: Изменение репутации (положительное или отрицательное)
        createdAt:
          type: string
          format: date-time
          description: Время изменения репутации
        comment:
          type: string
          description: Комментарий к изменению репутации (например, причина изменения или пояснение начисления)
    AdminUserReputationStatistics:
      type: object
      required:
        - currentPoints
        - history
      properties:
        currentPoints:
          $ref: '#/components/schemas/ReputationPoints'
        history:
          type: array
          description: История начислений и штрафов пользователя
          items:
            $ref: '#/components/schemas/ReputationEvent'
    AdminUserSocialStatistics:
      type: object
      required:
        - followersCount
        - subscriptionsCount
      properties:
        followersCount:
          type: integer
          minimum: 0
          description: Число подписчиков пользователя
        subscriptionsCount:
          type: integer
          minimum: 0
          description: Число подписок пользователя
    AdminUserStatistics:
      type: object
      required:
        - reputation
        - social
      properties:
        reputation:
          $ref: '#/components/schemas/AdminUserReputationStatistics'
        social:
          $ref: '#/components/schemas/AdminUserSocialStatistics'
    getSubscriptionsResponse:
      type: array
      items:
        $ref: '#/components/schemas/User'
    SubscribeRequest:
      type: object
      required:
        - targetUserId
      properties:
        targetUserId:
          type: string
          format: uuid
          description: Идентификатор пользователя, на которого нужно подписаться
    Latitude:
      type: number
      format: double
      minimum: -90
      maximum: 90
      description: Широта в градусах WGS84
      example: 55.751244
    Longitude:
      type: number
      format: double
      minimum: -180
      maximum: 180
      description: Долгота в градусах WGS84
      example: 37.618423
    Me:
      type: object
      required:
        - id
        - email
        - createdAt
        - isAdmin
        - reputationPoints
      properties:
        id:
          $ref: '#/components/schemas/UserId'
        email:
          type: string
          format: email
          description: User email
          example: email@example.com
        createdAt:
          type: string
          format: date-time
          description: User registration timestamp
          example: '2026-03-04T12:00:00Z'
        isAdmin:
          type: boolean
          description: Whether the current user has admin access
          example: false
        name:
          $ref: '#/components/schemas/Name'
        bio:
          $ref: '#/components/schemas/Bio'
        avatarUrl:
          $ref: '#/components/schemas/AvatarUrl'
        phoneNumber:
          $ref: '#/components/schemas/PhoneNumber'
        reputationPoints:
          $ref: '#/components/schemas/ReputationPoints'
        currentLatitude:
          allOf:
            - $ref: '#/components/schemas/Latitude'
          nullable: true
          description: |
            Текущая точка пользователя.
            `null`, если пользователь ещё не сохранял свою точку или очистил её.
        currentLongitude:
          allOf:
            - $ref: '#/components/schemas/Longitude'
          nullable: true
          description: |
            Текущая точка пользователя.
            `null`, если пользователь ещё не сохранял свою точку или очистил её.
    UpdateUserRequest:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/Name'
        bio:
          $ref: '#/components/schemas/Bio'
        avatarUrl:
          $ref: '#/components/schemas/AvatarUrl'
        phoneNumber:
          $ref: '#/components/schemas/PhoneNumber'
        currentLatitude:
          allOf:
            - $ref: '#/components/schemas/Latitude'
          nullable: true
          description: |
            Новая текущая широта пользователя.
            Если передано вместе с `currentLongitude`, текущая точка пользователя обновляется.
            Если передано `null` вместе с `currentLongitude: null`, текущая точка пользователя удаляется.
        currentLongitude:
          allOf:
            - $ref: '#/components/schemas/Longitude'
          nullable: true
          description: |
            Новая текущая долгота пользователя.
            Если передано вместе с `currentLatitude`, текущая точка пользователя обновляется.
            Если передано `null` вместе с `currentLatitude: null`, текущая точка пользователя удаляется.
    AvatarUploadResponse:
      type: object
      required:
        - avatarUrl
      properties:
        avatarUrl:
          $ref: '#/components/schemas/AvatarUrl'
    GetReputationEventsResponse:
      type: array
      items:
        $ref: '#/components/schemas/ReputationEvent'
  parameters:
    Id:
      name: id
      in: path
      required: true
      description: User ID
      schema:
        type: string
        format: uuid
