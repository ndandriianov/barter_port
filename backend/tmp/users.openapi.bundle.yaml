openapi: 3.0.3
info:
  title: Users API
  description: Users API
  version: 1.0.0
servers:
  - url: http://localhost:80
paths:
  /users/subscriptions:
    post:
      tags:
        - Subscriptions
      summary: Подписаться на пользователя
      description: |
        Позволяет подписаться на другого пользователя, чтобы смотреть его публикации в своей ленте.

        Писать другому пользователю в личные сообщения можно только при взаимной подписке.
      operationId: subscribeToUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
      responses:
        '201':
          description: Успешная подписка
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Конфликт - уже подписаны
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Subscriptions
      summary: Получить список подписок
      description: |
        Позволяет получить список пользователей, на которых подписан текущий пользователь.
      operationId: getSubscriptions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список подписок
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/getSubscriptionsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Subscriptions
      summary: Отписаться от пользователя
      description: |
        Позволяет отписаться от другого пользователя, чтобы больше не видеть его публикации в своей ленте.

        Если пользователи были взаимно подписаны, то после отписки от одного из них, нельзя инициировать чат,
        но сохраняется возможность писать друг другу в уже существующий чат.
      operationId: unsubscribeFromUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
      responses:
        '204':
          description: Успешная отписка
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Конфликт - не подписаны
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/subscriptions/{id}:
    get:
      tags:
        - Subscriptions
      summary: Получить список подписок пользователя
      description: |
        Позволяет получить список пользователей, на которых подписан другой пользователь.
      operationId: getSubscriptionsByUserId
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Список подписок
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/getSubscriptionsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/subscribers:
    get:
      tags:
        - Subscriptions
      summary: Получить список своих подписчиков
      description: |
        Позволяет получить список пользователей, которые подписаны на текущего пользователя.
      operationId: getMySubscribers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список подписчиков
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/getSubscriptionsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/subscribers/{id}:
    get:
      tags:
        - Subscriptions
      summary: Получить список подписчиков пользователя
      description: |
        Позволяет получить список пользователей, которые подписаны на другого пользователя.
      operationId: getSubscribersByUserId
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Список подписчиков
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/getSubscriptionsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me:
    get:
      tags:
        - users, me
      summary: Получить информацию о себе
      description: |
        Возвращает информацию о текущем пользователе.
        Обращается к auth сервису для получения email, createdAt и признака admin.
        Также возвращает текущий рейтинг пользователя (`reputationPoints`).
        В это значение входят как штрафы, так и положительные начисления,
        включая награду за завершение сделки и за оставление отзыва.
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Информация о пользователе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - users, me
      summary: Редактировать информацию о себе
      description: |
        Позволяет отредактировать имя или биографию текущего пользователя.
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Информация о пользователе после обновления
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me/avatar:
    post:
      tags:
        - users, me
      summary: Загрузить аватар текущего пользователя
      description: |
        Принимает файл изображения, загружает его в S3-совместимое хранилище
        и возвращает публичный URL, который затем можно сохранить в профиле.
      operationId: uploadCurrentUserAvatar
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Публичный URL загруженного аватара
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarUploadResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{id}:
    get:
      tags:
        - users
      summary: Получить информацию о пользователе по id
      description: |
        Возвращает информацию о пользователе по его id.
        Обращается к auth сервису для получения email и createdAt.
      operationId: getUserById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Информация о пользователе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/reputation-events:
    get:
      tags:
        - users
      summary: Получить события изменения репутации текущего пользователя
      description: |
        Возвращает список событий, связанных с изменением репутации текущего пользователя.
        Каждое событие содержит информацию о том, что произошло, сколько очков репутации было добавлено или отнято,
        и когда это произошло.
        В список входят как штрафы, так и положительные начисления из `deals`,
        в том числе за завершение сделки и за создание отзыва.
      operationId: getCurrentUserReputationEvents
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список событий изменения репутации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetReputationEventsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UserId:
      type: string
      format: uuid
      description: User ID
      example: 123e4567-e89b-12d3-a456-426614174000
    Name:
      type: string
      description: User name
      example: John Doe
    Bio:
      type: string
      description: User bio
      example: I am a software developer who loves bartering.
    AvatarUrl:
      type: string
      format: uri
      description: User avatar URL
      example: http://localhost:8333/avatars/user-123/avatar.jpg
    User:
      type: object
      required:
        - id
      properties:
        id:
          $ref: '#/components/schemas/UserId'
        name:
          $ref: '#/components/schemas/Name'
        bio:
          $ref: '#/components/schemas/Bio'
        avatarUrl:
          $ref: '#/components/schemas/AvatarUrl'
    getSubscriptionsResponse:
      type: array
      items:
        $ref: '#/components/schemas/User'
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Вы отправили некорректный запрос
    SubscribeRequest:
      type: object
      required:
        - targetUserId
      properties:
        targetUserId:
          type: string
          format: uuid
          description: Идентификатор пользователя, на которого нужно подписаться
    ReputationPoints:
      type: integer
      description: Current user reputation score including rewards and penalties
      example: -10
    Me:
      type: object
      required:
        - id
        - email
        - createdAt
        - isAdmin
        - reputationPoints
      properties:
        id:
          $ref: '#/components/schemas/UserId'
        email:
          type: string
          format: email
          description: User email
          example: email@example.com
        createdAt:
          type: string
          format: date-time
          description: User registration timestamp
          example: '2026-03-04T12:00:00Z'
        isAdmin:
          type: boolean
          description: Whether the current user has admin access
          example: false
        name:
          $ref: '#/components/schemas/Name'
        bio:
          $ref: '#/components/schemas/Bio'
        avatarUrl:
          $ref: '#/components/schemas/AvatarUrl'
        reputationPoints:
          $ref: '#/components/schemas/ReputationPoints'
    UpdateUserRequest:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/Name'
        bio:
          $ref: '#/components/schemas/Bio'
        avatarUrl:
          $ref: '#/components/schemas/AvatarUrl'
    AvatarUploadResponse:
      type: object
      required:
        - avatarUrl
      properties:
        avatarUrl:
          $ref: '#/components/schemas/AvatarUrl'
    ReputationEvent:
      type: object
      required:
        - id
        - sourceType
        - sourceId
        - delta
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор события репутации
        sourceType:
          type: string
          enum:
            - deals.offer_report.penalty
            - deals.deal_failure.responsible
            - deals.deal_completion.reward
            - deals.review_creation.reward
          description: |
            Источник изменения репутации.
        sourceId:
          type: string
          format: uuid
          description: |
            Идентификатор источника изменения репутации:
            - для `deals.offer_report.penalty` - id жалобы на оффер;
            - для `deals.deal_failure.responsible` - уникальный id события штрафа за провал сделки;
            - для `deals.deal_completion.reward` - уникальный id начисления за конкретную пару `(dealId, userId)`;
            - для `deals.review_creation.reward` - уникальный id начисления за review-контекст автора.
        delta:
          type: integer
          description: Изменение репутации (положительное или отрицательное)
        createdAt:
          type: string
          format: date-time
          description: Время изменения репутации
        comment:
          type: string
          description: Комментарий к изменению репутации (например, причина изменения или пояснение начисления)
    GetReputationEventsResponse:
      type: array
      items:
        $ref: '#/components/schemas/ReputationEvent'
  parameters:
    Id:
      name: id
      in: path
      required: true
      description: User ID
      schema:
        type: string
        format: uuid
