    UpdateDealItemRequest:
      type: object
      minProperties: 1
      description: |
        Хотя бы одно поле обязательно.
        Один и тот же пользователь не может одновременно быть `provider` и `receiver` для одной позиции.
      properties:
        name:
          type: string
          description: Новое название позиции (только для автора)
        description:
          type: string
          description: Новое описание позиции (только для автора)
        quantity:
          type: integer
          minimum: 1
          description: Новое количество (только для автора)
        deletePhotoIds:
          type: array
          description: |
            Идентификаторы существующих фотографий позиции, которые нужно удалить.
            Порядок остальных фотографий сохраняется, новые добавляются в конец.
          items:
            type: string
            format: uuid
        photos:
          type: array
          description: |
            Новые фотографии позиции сделки.
            Каждая фотография передается отдельным бинарным файлом в `multipart/form-data`
            и будет добавлена в конец списка после оставшихся фотографий.
          items:
            type: string
            format: binary
        claimProvider:
          type: boolean
          description: Назначить текущего пользователя поставщиком (только если слот свободен и пользователь не является receiver этой же позиции)
        releaseProvider:
          type: boolean
          description: Освободить слот поставщика (только если текущий пользователь является поставщиком)
        claimReceiver:
          type: boolean
          description: Назначить текущего пользователя получателем (только если слот свободен и пользователь не является provider этой же позиции)
        releaseReceiver:
          type: boolean
          description: Освободить слот получателя (только если текущий пользователь является получателем)
    AddDealItemRequest:
      type: object
      required:
        - offerId
        - quantity
      properties:
        offerId:
          type: string
          format: uuid
          description: |
            ID предложения, которое пользователь хочет добавить в сделку.
            Предложение должно принадлежать пользователю и быть в статусе active.
        quantity:
          type: integer
          minimum: 1
          description: |
            Количество единиц предложения, которые пользователь хочет добавить в сделку.
            Должно быть положительным числом.
    OfferRef:
      type: object
      required:
        - offerId
      properties:
        offerId:
          type: string
          format: uuid
          description: Идентификатор исходного offer.
    DealItemRef:
      type: object
      required:
        - dealId
        - itemId
      properties:
        dealId:
          type: string
          format: uuid
          description: Идентификатор сделки, в рамках которой был создан item.
        itemId:
          type: string
          format: uuid
          description: Идентификатор item внутри завершенной сделки.
    Review:
      type: object
      required:
        - id
        - dealId
        - authorId
        - providerId
        - rating
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор отзыва.
        dealId:
          type: string
          format: uuid
          description: Идентификатор завершенной сделки, по итогам которой оставлен отзыв.
        authorId:
          type: string
          format: uuid
          description: Идентификатор пользователя, оставившего отзыв.
        providerId:
          type: string
          format: uuid
          description: |
            Идентификатор пользователя, который фактически предоставил товар либо услугу по item.
            Это значение берется из `items.provider_id` в момент создания отзыва и после этого не меняется.
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Оценка предложения по шкале от 1 до 5.
        comment:
          type: string
          description: Текстовый отзыв.
        createdAt:
          type: string
          format: date-time
          description: Временная метка создания отзыва.
        updatedAt:
          type: string
          format: date-time
          description: Временная метка последнего редактирования отзыва.
        offerRef:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/OfferRef'
          description: |
            Ссылка на исходный `offer`, если отзыв относится к offer.

            Правила заполнения:
            - `items.offer_id IS NULL` -> `offerRef = null`;
            - `items.offer_id IS NOT NULL` и `items.updated_at IS NULL` -> отзыв относится только к `offer`,
              поэтому `offerRef != null`, `itemRef = null`;
            - `items.offer_id IS NOT NULL` и `items.updated_at IS NOT NULL` -> отзыв относится и к `offer`, и к `item`,
              поэтому `offerRef != null`, `itemRef != null`.
        itemRef:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DealItemRef'
          description: |
            Ссылка на `item`, если отзыв относится к item.

            Правила заполнения:
            - `items.offer_id IS NULL` -> отзыв относится только к `item`,
              поэтому `offerRef = null`, `itemRef != null`;
            - `items.offer_id IS NOT NULL` и `items.updated_at IS NULL` -> отзыв относится только к `offer`,
              поэтому `itemRef = null`;
            - `items.offer_id IS NOT NULL` и `items.updated_at IS NOT NULL` -> отзыв относится и к `offer`, и к `item`,
              поэтому `offerRef != null`, `itemRef != null`.
    GetItemReviewsResponse:
