openapi: 3.0.3
info:
  title: Deals API
  description: Deals API
  version: 1.0.0
servers:
  - url: http://localhost:80
paths:
  /deals/drafts:
    post:
      tags:
        - drafts
      summary: Создать новый черновой договор из объявлений
      description: |
        Для каждого объявления, которое должно войти в черновой договор необходимо указать список из:

        - `itemID` id объявления, которое должно войти в черновой договор.
        - `quantity` количество единиц товара из объявления, которое должно войти в черновой договор.

        В ответе придет созданный черновой договор с его `id`, который можно будет использовать для дальнейших действий
      operationId: createDraftDeal
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDraftDealRequest'
      responses:
        '201':
          description: Draft deal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: One or more items not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/drafts/my:
    get:
      summary: Получить ID всех черновых договоров, созданных текущим пользователем
      operationId: getMyDraftDeals
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMyDraftDealsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/drafts/{draftId}:
    get:
      summary: Получить черновой договор по его ID
      operationId: getDraftDealById
      security:
        - bearerAuth: []
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Draft deal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    CreateDraftDealRequest:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            required:
              - itemID
              - quantity
            properties:
              itemID:
                type: string
                format: uuid
                description: The ID of the item to include in the draft deal
              quantity:
                type: integer
                description: The quantity of the item to include in the draft deal
      required:
        - items
    Item:
      type: object
      required:
        - id
        - name
        - quantity
        - ownerId
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the item
        name:
          type: string
          description: The name of the item
        description:
          type: string
          description: A detailed description of the item
        quantity:
          type: integer
          description: The quantity of the item available for barter
        ownerId:
          type: string
          format: uuid
          description: The ID of the user who owns the item
        createdAt:
          type: string
          format: date-time
          description: The timestamp when the item was created
        updatedAt:
          type: string
          format: date-time
          description: The timestamp when the item was last updated
    Draft:
      type: object
      required:
        - id
        - items
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the draft deal
        items:
          $ref: '#/components/schemas/Item'
        createdAt:
          type: string
          format: date-time
          description: The timestamp when the draft deal was created
        updatedAt:
          type: string
          format: date-time
          description: The timestamp when the draft deal was last updated
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Вы отправили некорректный запрос
    GetMyDraftDealsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: string
            format: uuid
            description: The unique identifier of a draft deal
