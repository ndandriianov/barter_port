openapi: 3.0.3
info:
  title: Deals API
  description: Deals API
  version: 1.0.0
servers:
  - url: http://localhost:80
paths:
  /deals/drafts:
    post:
      tags:
        - drafts
      summary: Создать новый черновой договор из объявлений
      description: |
        Для каждого объявления, которое должно войти в черновой договор необходимо указать список из:

        - `offerID` id объявления, которое должно войти в черновой договор.
        - `quantity` количество единиц товара из объявления, которое должно войти в черновой договор.

        В ответе придет созданный черновой договор с его `id`, который можно будет использовать для дальнейших действий
      operationId: createDraftDeal
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDraftDealRequest'
      responses:
        '201':
          description: Draft deal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDraftDealResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: One or more items not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - drafts
      summary: Получить ID черновых договоров
      description: |
        Получить список черновых договоров, отфильтрованных согласно переданным параметрам:

        - `createdByMe` - если true, то возвращать только черновые договоры, автором которых является текущий пользователь. По умолчанию false.
        - `participating` - если true, то возвращать только черновые договоры, участником которых является текущий пользователь. По умолчанию true.
      operationId: getMyDraftDeals
      security:
        - bearerAuth: []
      parameters:
        - name: createdByMe
          in: query
          required: false
          schema:
            type: boolean
        - name: participating
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMyDraftDealsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/drafts/{draftId}:
    get:
      tags:
        - drafts
      summary: Получить черновой договор по его ID
      operationId: getDraftDealById
      security:
        - bearerAuth: []
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Draft deal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - drafts
      summary: Подтвердить участие в сделке
      description: |
        Подтверждает участие текущего пользователя в сделке.
        После того, как все участники черновика подтвердят свое участие, создается сделка,
        используемые в ней offers превращаются в item сделки, а их фотографии копируются в item.
        После этого item хранит собственные фотографии независимо от offer; из исходной связи сохраняется только `offerId`.

        Запрос идемпотентный.
      operationId: confirmDraftDeal
      security:
        - bearerAuth: []
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmDraftDealResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden. User is not a participant of the draft deal'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Draft deal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - drafts
      summary: Удалить черновой договор
      description: |
        Удаляет черновой договор. Доступно любому участнику чернового договора.
      operationId: deleteDraftDeal
      security:
        - bearerAuth: []
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden. User is not a participant of the draft deal'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Draft deal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/drafts/{draftId}/cancel:
    patch:
      tags:
        - drafts
      summary: Отменить участие в сделке
      description: |
        Отменяет участие текущего пользователя в сделке.
        После того, как один из участников черновика отменит свое участие, черновой договор удаляется,
        а его участники получают нотификацию об отмене сделки.

        Запрос идемпотентный. Возможен только на стадии черновика, после создания сделки отменить участие нельзя.
      operationId: cancelDraftDeal
      security:
        - bearerAuth: []
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden. User is not a participant of the draft deal'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Draft deal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals:
    get:
      tags:
        - Deals
      summary: Получить список доступных сделок
      description: |
        Возвращает список сделок, доступных текущему пользователю.

        Признак администратора определяется сервером по Bearer JWT. Клиент не передает роль или `adminId` в запросе.

        Правила доступа:
        - администратор может просматривать все сделки;
        - не-администратор может просматривать все сделки в статусе `LookingForParticipants`;
        - не-администратор может просматривать сделки в остальных статусах только если его `userId` входит в `participants`.

        Правила фильтрации:
        - `my=true` возвращает только сделки, в которых текущий пользователь является участником;
        - `open=true` возвращает только сделки в статусе `LookingForParticipants`;
        - если указаны оба параметра, возвращается пересечение фильтров доступа и параметров запроса.

        Для каждой сделки также возвращается список `items` с их фотографиями.
      operationId: getDeals
      parameters:
        - name: my
          in: query
          description: False by default. Если true, возвращает только сделки, в которых текущий пользователь является участником
          required: false
          schema:
            type: boolean
        - name: open
          in: query
          description: False by default. Если true, возвращает только сделки в статусе `LookingForParticipants`
          required: false
          schema:
            type: boolean
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список сделок, доступных текущему пользователю
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDealsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/{dealId}:
    patch:
      tags:
        - Deals
      summary: Обновить название сделки
      description: Обновить название сделки. Только участники сделки могут изменять её название.
      operationId: updateDeal
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDealRequest'
      responses:
        '200':
          description: Обновлённая сделка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        '400':
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Пользователь не является участником сделки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Сделка не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Deals
      summary: Получить сделку по ID
      description: |
        Возвращает сделку по ID, если она доступна текущему пользователю.

        Признак администратора определяется сервером по Bearer JWT. Клиент не передает роль или `adminId` в запросе.

        Правила доступа:
        - администратор может получить любую сделку;
        - не-администратор может получить сделку в статусе `LookingForParticipants`;
        - не-администратор может получить сделку в любом другом статусе только если его `userId` входит в `participants`.
      operationId: getDealById
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Сделка доступна текущему пользователю
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        '400':
          description: Invalid deal ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Сделка не найдена или недоступна текущему пользователю
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/{dealId}/status:
    patch:
      tags:
        - Deals
      summary: Подтвердить/Отменить сделку
      description: |
        Запросить переход к следующему статусу сделки.
        Когда все пользователи указали один и тот же статус сделки (вперед), то выполняется переход к новому статусу.
        Сделка должна быть в статусе, предшествующем указанному.
        Если пользователь выбирает статус отмены, то сделка сразу же переходит в статус отменён.
        Статус Failed не может быть установлен через этот эндпоинт.

        Начисление репутации:
        - при фактическом переходе сделки в статус `Completed` каждому участнику сделки начисляются очки репутации;
        - количество очков берётся из `reputation.deal_completion_reward_points`;
        - начисление выполняется асинхронно: `deals` пишет событие в `reputation_events_outbox`, далее оно доставляется в `users` через Kafka;
        - начисление должно быть идемпотентным и происходить не более одного раза на пару `(dealId, userId)`.

        Если по сделке уже создана запись в `deal_failures` и она ожидает решения админа,
        менять статус сделки через этот эндпоинт нельзя.
      operationId: ChangeDealStatus
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeDealStatusRequest'
      responses:
        '200':
          description: Запрос обработан, возвращает обновлённую сделку
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        '400':
          description: Некорректный запрос (например, сделка не в том статусе)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Операция запрещена по бизнес-правилам
            (пользователь не является участником сделки, либо голосовал за Failed,
            либо по сделке уже создана запись в `deal_failures`, ожидающая решения админа)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Deal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Deals
      summary: Получить список голосов за переход к следующему статусу сделки
      operationId: GetDealStatusVotes
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDealStatusVotesResponse'
        '400':
          description: Invalid deal ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Deal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/{dealId}/items/{itemId}:
    patch:
      tags:
        - Deals
      summary: Редактировать позицию сделки
      description: |
        Редактировать позицию сделки.

        - Редактирование доступно только в статусах `LookingForParticipants` и `Discussion`.
        - Поля `name`, `description`, `quantity` может менять только автор позиции (`author_id`).
        - Роли `provider`/`receiver` можно claim/release по бизнес-правилам.
        - Если по сделке уже создана запись в `deal_failures` и она ожидает решения админа, редактирование позиции запрещено.
      operationId: updateDealItem
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDealItemRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateDealItemRequest'
      responses:
        '200':
          description: Обновлённая позиция сделки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '400':
          description: |
            Некорректный запрос:
            - пустое тело запроса;
            - сделка не находится в статусе `LookingForParticipants` или `Discussion`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Операция запрещена по бизнес-правилам:
            - пользователь не является автором позиции при изменении контентных полей;
            - роль уже занята другим пользователем;
            - пользователь не владеет ролью при release;
            - пользователь уже занимает другую роль (`provider`/`receiver`) для этой же позиции;
            - по сделке уже создана запись в `deal_failures`, ожидающая решения админа.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Сделка или позиция не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/{dealId}/items:
    post:
      tags:
        - Deals
      summary: Добавить позицию в сделку
      description: |
        Пользователь указывает id одного из своих offers, на основании offer формируется item, item добавляется в сделку.
        Фотографии offer копируются в item, после чего item использует уже собственные фотографии.

        Если по сделке уже создана запись в `deal_failures` и она ожидает решения админа,
        добавление новой позиции запрещено.
      operationId: addDealItem
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddDealItemRequest'
      responses:
        '200':
          description: Новая позиция сделки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        '400':
          description: Некорректный запрос (пустое тело)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Операция запрещена по бизнес-правилам:
            сделка не в статусе LookingForParticipants, либо пользователь не является участником сделки,
            либо по сделке уже создана запись в `deal_failures`, ожидающая решения админа
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Сделка не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/{dealId}/items/{itemId}/reviews:
    get:
      tags:
        - Reviews
      summary: Получить отзывы по item
      description: |
        Возвращает отзывы, относящиеся к конкретному `item` завершенной сделки.

        Доступ:
        - endpoint доступен любому авторизованному пользователю.

        Особенности:
        - отзывы возвращаются в порядке от новых к старым;
        - `providerId` обязателен в каждом отзыве и указывает, кто именно фактически предоставил товар/услугу;
        - если отзыв относится только к `item`, будет заполнен только `itemRef`;
        - если отзыв относится и к `offer`, и к `item`, в ответе будут заполнены обе ссылки.
      operationId: getDealItemReviews
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список отзывов по item
          content:
            application/json:
              schema:
