  /deals/{dealId}/reviews-pending:
    get:
      tags:
        - Reviews
      summary: Получить pending отзывы по сделке
      description: |
        Возвращает для текущего пользователя все review-контексты в рамках сделки, по которым отзыв
        еще потенциально может быть оставлен или уже недоступен.

        Бизнес-правила:
        - endpoint вычисляется относительно текущего аутентифицированного пользователя;
        - endpoint доступен любому авторизованному пользователю;
        - в выборку попадают только item, где текущий пользователь является `receiver_id`;
        - для каждого контекста возвращается `canCreate` и, если нужно, `reason`;
        - если по контексту уже существует отзыв текущего пользователя, возвращается `canCreate = false`
          и `reason = already_reviewed`;
        - если сделка не находится в статусе `Completed`, endpoint возвращает `400`.
      operationId: getDealPendingReviews
      security:
