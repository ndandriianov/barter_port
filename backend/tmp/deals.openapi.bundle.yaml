      responses:
        '200':
          description: Детали жалобы на объявление
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferReportDetails'
        '400':
          description: Invalid report ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Report not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/offer-reports/{reportId}/resolution:
    post:
      tags:
        - admin
        - offer-reports
      summary: Resolve offer report
      description: |
        Позволяет администратору принять или отклонить жалобу.

        Если жалоба принята:
        - объявление скрывается;
        - автор объявления получает штраф `-10`;
        - событие для штрафа пишется в outbox таблицу.

        Если жалоба отклонена:
        - объявление остается видимым;
        - жалоба только помечается как `Rejected`.
      operationId: resolveOfferReportForAdmin
      security:
        - bearerAuth: []
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveOfferReportRequest'
      responses:
        '200':
          description: Report resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferReport'
        '400':
          description: Некорректное тело запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Report not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Report already resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/tags:
    delete:
      tags:
        - admin
        - tags
      summary: Удалить тег
      description: |
        Удаляет тег по имени.

        Endpoint доступен только администратору.

        Правила:
        - имя тега нормализуется сервером как `trim + lowercase`;
        - тег удаляется из всех `offers`, где он был привязан;
        - если тег не найден, сервер возвращает `404`.
      operationId: deleteAdminTag
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: query
          required: true
          description: Имя тега для удаления.
          schema:
            $ref: '#/components/schemas/TagName'
      responses:
        '204':
          description: Tag deleted
        '400':
          description: Некорректное имя тега
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Доступ запрещён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Tag not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/statistics:
    get:
      tags:
        - statistics
      summary: Получить мою статистику
      description: |
        Возвращает агрегированную статистику текущего пользователя:
        - сделки по статусам (завершённые, проваленные, активные)
        - объявления: количество и суммарные просмотры
        - отзывы: написанные, полученные, средний рейтинг
        - жалобы: поданные мной и на мои объявления (с разбивкой по статусам)
      operationId: getMyStatistics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Статистика текущего пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyStatistics'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /offer-groups:
    get:
      tags:
        - offer-groups
      summary: Получить список композитных объявлений
      description: |
        Возвращает список `offer_group`.

        Для каждого элемента возвращается полная структура группы:

        - метаданные `offer_group`
        - список `units`
        - список `offers` внутри каждого `unit`

        Endpoint является альтернативой `GET /offers` для композитных объявлений
        и не заменяет существующий список обычных объявлений.
      operationId: listOfferGroups
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Offer groups list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListOfferGroupsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - offer-groups
      summary: Создать композитное объявление
      description: |
        Создает `offer_group` как альтернативу обычному объявлению.

        Если `name` не передано, название группы генерируется сервером автоматически
        из названий `offers`:

        - внутри одного `unit` названия соединяются через ` и `
        - между `unit` названия соединяются через `, `

        Группа объявлений состоит из `units`, объединенных по логике `AND`.
        Внутри каждого `unit` объявления объединены по логике `OR`.

        Пример:

        - `unit A`: `offer-1 OR offer-2`
        - `unit B`: `offer-3`

        Итоговое имя будет: `offer-1 и offer-2, offer-3`

        Это означает, что при отклике пользователь должен выбрать ровно одно объявление из каждого `unit`.

        В группу можно включать только существующие объявления текущего пользователя.
        Внутри одного `unit` разрешены только объявления с одинаковым `action`.
      operationId: createOfferGroup
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOfferGroupRequest'
      responses:
        '201':
          description: Offer group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferGroup'
        '400':
          description: Invalid request body or mixed `action` values inside one unit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Один или несколько указанных объявлений принадлежат другому пользователю
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Один или несколько указанных объявлений не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /offer-groups/{offerGroupId}:
    get:
      tags:
        - offer-groups
      summary: Получить композитное объявление по ID
      description: |
        Возвращает структуру `offer_group` целиком:

        - метаданные группы
        - список `units`
        - список `offers` внутри каждого `unit`

        Этот endpoint нужен клиенту, чтобы пользователь мог выбрать конкретный `offer`
        из каждой OR-группы перед созданием `draft deal`.
      operationId: getOfferGroupById
      security:
        - bearerAuth: []
      parameters:
        - name: offerGroupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferGroup'
        '400':
          description: Invalid offer group ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Offer group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /offer-groups/{offerGroupId}/drafts:
    post:
      tags:
        - offer-groups
      summary: Создать черновик сделки по композитному объявлению
      description: |
        Создает обычный `draft deal` на основании `offer_group`.

        Пользователь передает список `selectedOfferIds` и должен выбрать:

        - ровно один `offer` из каждого `unit`
        - только `offer`, которые входят в указанный `offer_group`

        Дополнительно пользователь может передать `responderOfferId`:

        - если у всех `unit` в группе одинаковый `action`, `responderOfferId` обязателен
        - в этом случае `responderOfferId` должен принадлежать текущему пользователю
          и иметь тот же `action`
        - если в группе есть разные `action`, `responderOfferId` опционален

        Каждый выбранный `offer` и `responderOfferId` попадает в `draft deal` с `quantity = 1`.

        После успешной валидации сервер формирует обычный `draft deal`,
        после чего продолжает работать существующая логика подтверждения,
        отмены и превращения черновика в `deal`.

        Этот endpoint является альтернативой прямому созданию черновика через `/deals/drafts`.
      operationId: createDraftDealFromOfferGroup
      security:
        - bearerAuth: []
      parameters:
        - name: offerGroupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOfferGroupDraftRequest'
      responses:
        '201':
          description: Draft deal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDraftDealResponse'
        '400':
          description: |
            Invalid selection or invalid responder offer.
            The request must contain exactly one selected offer per unit, and `responderOfferId`
            must satisfy the group action rules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: '`responderOfferId` does not belong to the current user'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Offer group or selected offers not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    GetMyDraftDealsResponseItem:
      type: object
      required:
        - id
        - participants
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор черновой сделки
        name:
          type: string
          description: Название черновой сделки
        participants:
          type: array
          description: Список ID всех пользователей, участвующих в этой сделке
          items:
            type: string
            format: uuid
            description: Уникальный идентификатор пользователя
    GetMyDraftDealsResponse:
      type: array
      items:
        $ref: '#/components/schemas/GetMyDraftDealsResponseItem'
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Вы отправили некорректный запрос
    OfferIDAndQuantity:
      type: object
      required:
        - offerID
        - quantity
      properties:
        offerID:
          type: string
          format: uuid
          description: ID объявления, которое нужно включить в черновую сделку
        quantity:
          type: integer
          description: Количество единиц объявления для включения в черновую сделку
    CreateDraftDealRequest:
      type: object
      properties:
        name:
          type: string
          description: An optional name for the draft deal
        description:
          type: string
          description: An optional description for the draft deal
        offers:
          type: array
          items:
            $ref: '#/components/schemas/OfferIDAndQuantity'
      required:
        - offers
    CreateDraftDealResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор созданной черновой сделки
    TagName:
      type: string
      minLength: 1
      maxLength: 15
      pattern: ^[A-Za-zА-Яа-яЁё]+$
      description: |
        Имя тега. Сервер выполняет нормализацию `trim + lowercase`.
        Допустимы только латинские и кириллические буквы.
    ItemType:
      type: string
      description: Type of barter item
      enum:
        - good
        - service
    OfferAction:
      type: string
      description: Whether the user offers or requests something
      enum:
        - give
        - take
    Latitude:
      type: number
      format: double
      minimum: -90
      maximum: 90
      description: Широта в градусах WGS84.
      example: 55.751244
    Longitude:
      type: number
      format: double
      minimum: -180
      maximum: 180
      description: Долгота в градусах WGS84.
      example: 37.618423
    Offer:
      type: object
      required:
        - id
        - authorId
        - name
        - type
        - action
        - description
        - tags
        - createdAt
        - views
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор объявления
        authorId:
          type: string
          format: uuid
          description: Уникальный идентификатор пользователя, который создал объявление
        authorName:
          type: string
          description: Имя пользователя, который создал объявление
        name:
          type: string
          description: Краткий заголовок объявления
          example: Ремонт велосипеда
        description:
          type: string
          description: Подробное описание объявления
          example: Могу помочь с ремонтом городских велосипедов и заменой тормозных колодок
        tags:
          type: array
          maxItems: 5
          description: |
            Список тегов объявления, отсортированный по `name ASC`.
            Каждый тег хранится и возвращается как нормализованная строка:
            `trim + lowercase`, только латинские и кириллические буквы, длина от 1 до 15 символов.
          items:
            $ref: '#/components/schemas/TagName'
        type:
          $ref: '#/components/schemas/ItemType'
        action:
          $ref: '#/components/schemas/OfferAction'
        views:
          type: integer
          format: int64
          minimum: 0
          description: Количество просмотров объявления
          example: 120
        createdAt:
          type: string
          format: date-time
          description: Временная метка создания объявления
          example: '2026-03-04T12:00:00Z'
        updatedAt:
          type: string
          format: date-time
          description: Временная метка последнего обновления объявления
          example: '2026-03-05T12:00:00Z'
        isFavorite:
          type: boolean
          description: |
            Находится ли объявление в избранном у текущего пользователя.
            Поле актуально только в контексте авторизованного пользователя.
        isHidden:
          type: boolean
          description: |
            Признак того, что объявление скрыто модератором.
            Скрытые объявления видны только автору объявления и администратору.
        modificationBlocked:
          type: boolean
          description: Признак того, что объявление временно заблокировано для редактирования из-за pending-жалобы.
        photoIds:
          type: array
          description: |
            Идентификаторы фотографий объявления в том же порядке, что и `photoUrls`.
            Используются для удаления отдельных фотографий при редактировании.
          items:
            type: string
            format: uuid
        photoUrls:
          type: array
          description: Публичные URL фотографий объявления
          items:
            type: string
            format: uri
        latitude:
          allOf:
            - $ref: '#/components/schemas/Latitude'
          nullable: true
          description: |
            Широта точки объявления.
            Поле присутствует в ответах с `offer` вне зависимости от того, кто вызвал GET.
            `null`, если автор не указал точку на карте.
        longitude:
          allOf:
            - $ref: '#/components/schemas/Longitude'
          nullable: true
          description: |
            Долгота точки объявления.
            Поле присутствует в ответах с `offer` вне зависимости от того, кто вызвал GET.
            `null`, если автор не указал точку на карте.
        distanceMeters:
          type: integer
          format: int64
          minimum: 0
          nullable: true
          description: |
            Расстояние по прямой от текущей точки пользователя до точки объявления, в метрах.
            Возвращается только если:
            - у текущего пользователя сохранены `currentLatitude` и `currentLongitude`;
            - у объявления указаны `latitude` и `longitude`;
            - объявление не принадлежит текущему пользователю.
            Иначе поле равно `null`.
        draftsCount:
          type: integer
          minimum: 0
          description: Количество черновых сделок, в которых участвует объявление. Возвращается только для авторов объявления.
    OfferInfo:
      type: object
      required:
        - quantity
      properties:
        quantity:
          type: integer
          description: Количество единиц объявления для включения в черновую сделку
        confirmed:
          type: boolean
          description: Подтверждено ли объявление для черновой сделки.
    OfferWithInfo:
      allOf:
        - $ref: '#/components/schemas/Offer'
        - $ref: '#/components/schemas/OfferInfo'
    Draft:
      type: object
      required:
        - id
        - authorId
        - createdAt
        - offers
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор черновой сделки
        authorId:
          type: string
          format: uuid
          description: Уникальный идентификатор пользователя, который создал черновую сделку
        name:
          type: string
          description: Название черновой сделки
        description:
          type: string
          description: Подробное описание черновой сделки
        createdAt:
          type: string
          format: date-time
          description: Временная метка создания черновой сделки
        updatedAt:
          type: string
          format: date-time
          description: Временная метка последнего обновления черновой сделки
        offers:
          type: array
          description: Список объявлений, включённых в черновую сделку
          items:
            $ref: '#/components/schemas/OfferWithInfo'
    UserConfirm:
      type: object
      required:
        - userId
        - confirmed
      properties:
        userId:
          type: string
          format: uuid
          description: Уникальный идентификатор пользователя
        confirmed:
          type: boolean
          description: Статус подтверждения участия пользователя в сделке
    ConfirmDraftDealResponse:
      type: object
      required:
        - users
      properties:
        users:
          type: array
          description: Список пользователей, которые подтвердили/не подтвердили свое участие в сделке
          items:
            $ref: '#/components/schemas/UserConfirm'
    DealStatus:
      type: string
      description: Статус сделки
      enum:
        - LookingForParticipants
        - Discussion
        - Confirmed
        - Completed
        - Cancelled
        - Failed
    Item:
      type: object
      required:
        - id
        - authorId
        - name
        - description
        - type
        - quantity
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор позиции сделки
        authorId:
          type: string
          format: uuid
          description: Уникальный идентификатор пользователя, который предложил эту позицию в сделке
        offerId:
          type: string
          format: uuid
          description: |
            Идентификатор исходного offer, на базе которого создана позиция сделки.
            При создании item фотографии offer копируются в item, поэтому дальнейшие изменения фотографий offer на item не влияют.
        providerId:
          type: string
          format: uuid
