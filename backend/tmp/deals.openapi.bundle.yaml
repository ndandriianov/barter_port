        contextType:
          $ref: '#/components/schemas/ReviewContextType'
        providerId:
          nullable: true
          type: string
          format: uuid
          description: |
            Идентификатор пользователя, который будет сохранен как `review.providerId`.
            Может быть `null`, если контекст недоступен из-за `provider_missing`.
        offerRef:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/OfferRef'
          description: Ссылка на offer, если отзыв затрагивает offer.
        itemRef:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DealItemRef'
          description: Ссылка на item, если отзыв затрагивает item.
        canCreate:
          type: boolean
          description: Может ли текущий пользователь оставить отзыв по этому контексту.
        reason:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ReviewEligibilityReason'
          description: |
            Причина, по которой отзыв недоступен для создания. Заполняется только если `canCreate = false`.
            Если `canCreate = true`, поле равно `null`.
    GetPendingDealReviewsResponse:
      type: array
      items:
        $ref: '#/components/schemas/PendingDealReview'
    UpdateReviewRequest:
      type: object
      minProperties: 1
      description: |
        Хотя бы одно поле обязательно.
        Изменять можно только содержимое отзыва: `rating` и/или `comment`.
        Поля контекста (`authorId`, `providerId`, `offerRef`, `itemRef`) не редактируются.
      properties:
        rating:
          type: integer
          minimum: 1
