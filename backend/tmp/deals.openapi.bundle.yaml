          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Материалы по провалу сделки успешно получены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureMaterialResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Операция запрещена по бизнес-правилам: пользователь не является админом,
            либо по сделке еще не создана запись в `deal_failures`,
            либо сделка уже отменена/завершена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Сделка не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/failures/{dealId}/moderator-resolution:
    post:
      tags:
        - Failures
      summary: Решение админа по провалу сделки
      description: |
        Админ принимает решение о виновнике провала сделки в случае,
        если голоса участников распределились между несколькими кандидатами,
        либо если он не согласен с результатом голосования. Решение админа является окончательным.

        Если `confirmed = true`, сделка переходит в статус `Failed`.
        Если при этом `userId` не передан, в `deal_failures.user_id` сохраняется `null`.

        Админ может принять решение что сделка не провалена, тогда она переходит в статус Completed,
        если была в статусе Confirmed, в ином случае она переходит в Cancelled.

        Если confirmed = false, передавать userId и punishmentPoints нельзя.
        Если confirmed = true, userId можно не передавать.
        Решение админа можно отправить только один раз.

        Эндпоинт предназначен для использования только админом. Остальным возвращает 403
      operationId: moderatorResolutionForFailure
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModeratorResolutionForFailureRequest'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Решение админа успешно учтено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealFailureModeratorResolution'
        '400':
          description: |
            Некорректный запрос: пустое тело, неконсистентные поля решения,
            либо userId / punishmentPoints переданы при confirmed = false
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Операция запрещена по бизнес-правилам: сделка не находится на рассмотрении админа,
            либо пользователь не является админом
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Сделка не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Решение админа по провалу сделки уже было принято ранее
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Failures
      summary: Получить решение админа по провалу сделки
      description: |
        Получить решение админа по провалу сделки могут только участники сделки и админ.

        Если сделка существует, но по ней еще не создана запись в `deal_failures`,
        эндпоинт возвращает 403.
      operationId: getModeratorResolutionForFailure
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Решение админа успешно получено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealFailureModeratorResolution'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Операция запрещена по бизнес-правилам:
            пользователь не является участником сделки и не является админом,
            либо по сделке еще не создана запись в `deal_failures`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Сделка не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /offers:
    get:
      tags:
        - offers
      summary: Список объявлений
      description: |
        Возвращает список объявлений с пагинацией.

        - Если `my=true`, возвращаются только объявления, созданные текущим пользователем.
          В этом режиме отображается количество черновиков, в которые входит данный offer
        - Скрытые объявления не показываются обычным пользователям.
        - Скрытые объявления видны:
          - автору объявления (в режиме `my=true`);
          - администраторам.

        Поддерживаемые режимы сортировки:
        - `ByTime`: сначала новые объявления
        - `ByPopularity`: сначала самые просматриваемые объявления
        - `ByDistance`: сначала ближайшие объявления к точке `user_lat` / `user_lon`

        Поля курсора зависят от выбранного режима сортировки:
        - для `ByTime`: используйте `cursor_created_at` + `cursor_id`
        - для `ByPopularity`: используйте `cursor_views` + `cursor_id`
        - для `ByDistance`: используйте `cursor_distance` + `cursor_id`

        Фильтрация по тегам:
        - `tags`: вернуть объявления, содержащие **все** указанные теги;
        - `withoutTags=true`: вернуть только объявления без тегов;
        - `tags` и `withoutTags=true` одновременно передавать нельзя.

        Геолокация:
        - поля `latitude` и `longitude` возвращаются в каждом объекте `offer` всегда,
          независимо от того, указал ли текущий пользователь свою точку;
        - если у объявления точка не указана, `latitude` и `longitude` равны `null`;
        - при `sort=ByDistance` обязательны `user_lat` и `user_lon`; в этом режиме
          `distanceMeters` возвращается для каждого объявления с координатами и считается от переданной точки;
        - в остальных режимах `distanceMeters` возвращается только если у текущего пользователя сохранена текущая точка через users API
          и у объявления указаны `latitude` и `longitude`.
      operationId: listOffers
      security:
        - bearerAuth: []
      parameters:
        - name: my
          in: query
          required: false
          description: |
            По умолчанию `false`. Если `true`, возвращаются только объявления, созданные текущим пользователем,
            включая скрытые.

            Если `false`, возвращаются все объявления, видимые текущему пользователю.
          schema:
            type: boolean
        - $ref: '#/components/parameters/SortType'
        - $ref: '#/components/parameters/CursorCreatedAt'
        - $ref: '#/components/parameters/CursorDistance'
        - $ref: '#/components/parameters/CursorViews'
        - $ref: '#/components/parameters/CursorId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/UserLat'
        - $ref: '#/components/parameters/UserLon'
        - $ref: '#/components/parameters/OfferTagsFilter'
        - $ref: '#/components/parameters/WithoutTags'
      responses:
        '200':
          description: Список объявлений и (опционально) курсор
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListOffersResponse'
        '400':
          description: Некорректные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - offers
      summary: Создать объявление
      description: |
        Создаёт новое объявление для бартера.

        Пользователь может опционально передать `latitude` и `longitude` точки объявления.
