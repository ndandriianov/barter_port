openapi: 3.0.3
info:
  title: Deals API
  description: Deals API
  version: 1.0.0
servers:
  - url: http://localhost:80
paths:
  /deals/drafts:
    post:
      tags:
        - drafts
      summary: Создать новый черновой договор из объявлений
      description: |
        Для каждого объявления, которое должно войти в черновой договор необходимо указать список из:

        - `offerID` id объявления, которое должно войти в черновой договор.
        - `quantity` количество единиц товара из объявления, которое должно войти в черновой договор.

        В ответе придет созданный черновой договор с его `id`, который можно будет использовать для дальнейших действий
      operationId: createDraftDeal
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDraftDealRequest'
      responses:
        '201':
          description: Draft deal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDraftDealResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: One or more items not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - drafts
      summary: Получить ID черновых договоров
      description: |
        Получить список черновых договоров, отфильтрованных согласно переданным параметрам:

        - `createdByMe` - если true, то возвращать только черновые договоры, автором которых является текущий пользователь. По умолчанию false.
        - `participating` - если true, то возвращать только черновые договоры, участником которых является текущий пользователь. По умолчанию true.
      operationId: getMyDraftDeals
      security:
        - bearerAuth: []
      parameters:
        - name: createdByMe
          in: query
          required: false
          schema:
            type: boolean
        - name: participating
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMyDraftDealsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/drafts/{draftId}:
    get:
      tags:
        - drafts
      summary: Получить черновой договор по его ID
      operationId: getDraftDealById
      security:
        - bearerAuth: []
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Draft deal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - drafts
      summary: Подтвердить участие в сделке
      description: |
        Подтверждает участие текущего пользователя в сделке.
        После того, как все участники черновика подтвердят свое участие, создается сделка,
        используемые в ней offers превращаются в item сделки, а их фотографии копируются в item.
        После этого item хранит собственные фотографии независимо от offer; из исходной связи сохраняется только `offerId`.

        Запрос идемпотентный.
      operationId: confirmDraftDeal
      security:
        - bearerAuth: []
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmDraftDealResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden. User is not a participant of the draft deal'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Draft deal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - drafts
      summary: Удалить черновой договор
      description: |
        Удаляет черновой договор. Доступно любому участнику чернового договора.
      operationId: deleteDraftDeal
      security:
        - bearerAuth: []
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden. User is not a participant of the draft deal'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Draft deal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/drafts/{draftId}/cancel:
    patch:
      tags:
        - drafts
      summary: Отменить участие в сделке
      description: |
        Отменяет участие текущего пользователя в сделке.
        После того, как один из участников черновика отменит свое участие, черновой договор удаляется,
        а его участники получают нотификацию об отмене сделки.

        Запрос идемпотентный. Возможен только на стадии черновика, после создания сделки отменить участие нельзя.
      operationId: cancelDraftDeal
      security:
        - bearerAuth: []
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden. User is not a participant of the draft deal'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Draft deal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals:
    get:
      tags:
        - Deals
      summary: Получить все сделки
      description: |
        Получить все сделки.

        - Если указать параметр my=true, то будут возвращены только сделки, в которых текущий пользователь является участником.
        - Если указать параметр open=true, то будут возвращены только открытые сделки.
        - Для каждой сделки также возвращается список `items` с их фотографиями.
      operationId: getDeals
      parameters:
        - name: my
          in: query
          description: False by default. Если true, возвращает только сделки, в которых текущий пользователь является участником
          required: false
          schema:
            type: boolean
        - name: open
          in: query
          description: False by default. Если true, возвращает только открытые сделки
          required: false
          schema:
            type: boolean
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDealsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/{dealId}:
    patch:
      tags:
        - Deals
      summary: Обновить название сделки
      description: Обновить название сделки. Только участники сделки могут изменять её название.
      operationId: updateDeal
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDealRequest'
      responses:
        '200':
          description: Обновлённая сделка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        '400':
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Пользователь не является участником сделки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Сделка не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Deals
      summary: Получить сделку по ее ID
      description: Получить сделку по ее ID
      operationId: getDealById
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        '400':
          description: Invalid deal ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Deal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/{dealId}/status:
    patch:
      tags:
        - Deals
      summary: Подтвердить/Отменить сделку
      description: |
        Запросить переход к следующему статусу сделки.
        Когда все пользователи указали один и тот же статус сделки (вперед), то выполняется переход к новому статусу.
        Сделка должна быть в статусе, предшествующем указанному.
        Если пользователь выбирает статус отмены, то сделка сразу же переходит в статус отменён.
        Статус Failed не может быть установлен через этот эндпоинт.

        Если по сделке уже создана запись в `deal_failures` и она ожидает решения админа,
        менять статус сделки через этот эндпоинт нельзя.
      operationId: ChangeDealStatus
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeDealStatusRequest'
      responses:
        '200':
          description: Запрос обработан, возвращает обновлённую сделку
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        '400':
          description: Некорректный запрос (например, сделка не в том статусе)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Операция запрещена по бизнес-правилам
            (пользователь не является участником сделки, либо голосовал за Failed,
            либо по сделке уже создана запись в `deal_failures`, ожидающая решения админа)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Deal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Deals
      summary: Получить список голосов за переход к следующему статусу сделки
      operationId: GetDealStatusVotes
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDealStatusVotesResponse'
        '400':
          description: Invalid deal ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Deal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/{dealId}/items/{itemId}:
    patch:
      tags:
        - Deals
      summary: Редактировать позицию сделки
      description: |
        Редактировать позицию сделки.

        - Редактирование доступно только в статусах `LookingForParticipants` и `Discussion`.
        - Поля `name`, `description`, `quantity` может менять только автор позиции (`author_id`).
        - Роли `provider`/`receiver` можно claim/release по бизнес-правилам.
        - Если по сделке уже создана запись в `deal_failures` и она ожидает решения админа, редактирование позиции запрещено.
      operationId: updateDealItem
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDealItemRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateDealItemRequest'
      responses:
        '200':
          description: Обновлённая позиция сделки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '400':
          description: |
            Некорректный запрос:
            - пустое тело запроса;
            - сделка не находится в статусе `LookingForParticipants` или `Discussion`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Операция запрещена по бизнес-правилам:
            - пользователь не является автором позиции при изменении контентных полей;
            - роль уже занята другим пользователем;
            - пользователь не владеет ролью при release;
            - пользователь уже занимает другую роль (`provider`/`receiver`) для этой же позиции;
            - по сделке уже создана запись в `deal_failures`, ожидающая решения админа.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Сделка или позиция не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/{dealId}/items:
    post:
      tags:
        - Deals
      summary: Добавить позицию в сделку
      description: |
        Пользователь указывает id одного из своих offers, на основании offer формируется item, item добавляется в сделку.
        Фотографии offer копируются в item, после чего item использует уже собственные фотографии.

        Если по сделке уже создана запись в `deal_failures` и она ожидает решения админа,
        добавление новой позиции запрещено.
      operationId: addDealItem
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddDealItemRequest'
      responses:
        '200':
          description: Новая позиция сделки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        '400':
          description: Некорректный запрос (пустое тело)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Операция запрещена по бизнес-правилам:
            сделка не в статусе LookingForParticipants, либо пользователь не является участником сделки,
            либо по сделке уже создана запись в `deal_failures`, ожидающая решения админа
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Сделка не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/{dealId}/items/{itemId}/reviews:
    get:
      tags:
        - Reviews
      summary: Получить отзывы по item
      description: |
        Возвращает отзывы, относящиеся к конкретному `item` завершенной сделки.

        Доступ:
        - endpoint доступен любому авторизованному пользователю.

        Особенности:
        - отзывы возвращаются в порядке от новых к старым;
        - `providerId` обязателен в каждом отзыве и указывает, кто именно фактически предоставил товар/услугу;
        - если отзыв относится только к `item`, будет заполнен только `itemRef`;
        - если отзыв относится и к `offer`, и к `item`, в ответе будут заполнены обе ссылки.
      operationId: getDealItemReviews
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список отзывов по item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetItemReviewsResponse'
        '400':
          description: Invalid path parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Сделка или item не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Reviews
      summary: Оставить отзыв о позиции сделки
      description: |
        Оставить отзыв по `item` завершенной сделки. Конкретная цель отзыва определяется автоматически
        по полям `items.offer_id` и `items.updated_at`.

        Бизнес-правила:
        - отзыв можно оставить только если сделка находится в статусе `Completed`;
        - отзыв может оставить только пользователь, который является `items.receiver_id` для этого item;
        - `items.provider_id` должен быть заполнен; именно это значение сохраняется в `review.providerId`;
        - если `items.provider_id = items.receiver_id`, отзыв создать нельзя;
        - `authorId` в созданном отзыве всегда равен `items.receiver_id`;
        - `providerId` в созданном отзыве всегда равен `items.provider_id`;
        - один пользователь может оставить не более одного отзыва на один и тот же контекст в рамках сделки.

        При создании отзыва:
        - если `items.offer_id IS NULL`, отзыв создается только на `item`;
        - если `items.offer_id IS NOT NULL` и `items.updated_at IS NULL`, отзыв создается только на `offer`;
        - если `items.offer_id IS NOT NULL` и `items.updated_at IS NOT NULL`, отзыв создается одновременно на `offer` и `item`.

        Контекст уникальности определяется так:
        - `item-only`: `(deal_id, item_id, author_id)`;
        - `offer-only`: `(deal_id, offer_id, author_id, provider_id)`;
        - `offer+item`: `(deal_id, offer_id, item_id, author_id, provider_id)`.
      operationId: createDealItemReview
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Отзыв создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          description: |
            Некорректный запрос:
            - сделка не находится в статусе `Completed`;
            - у item не заполнен `provider_id`;
            - у item не заполнен `receiver_id`;
            - `provider_id = receiver_id`;
            - рейтинг вне диапазона `1..5`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Операция запрещена:
            - пользователь не является `receiver_id` этого item;
            - пользователь пытается оставить отзыв на собственный offer в кейсах, где отзыв относится к offer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Сделка или item не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: |
            Пользователь уже оставил отзыв для этого контекста в рамках данной сделки:
            - `item-only`: `(deal_id, item_id, author_id)`;
            - `offer-only`: `(deal_id, offer_id, author_id, provider_id)`;
            - `offer+item`: `(deal_id, offer_id, item_id, author_id, provider_id)`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/{dealId}/items/{itemId}/reviews/eligibility:
    get:
      tags:
        - Reviews
      summary: Проверить возможность оставить отзыв по item
      description: |
        Возвращает для текущего пользователя вычисленную eligibility по одному `item`.

        Бизнес-правила:
        - endpoint вычисляется относительно текущего аутентифицированного пользователя;
        - endpoint доступен любому авторизованному пользователю;
        - если сделка не находится в статусе `Completed`, `canCreate = false` и `reason = deal_not_completed`;
        - если текущий пользователь не является `receiver_id` этого item, `canCreate = false`
          и `reason = forbidden_not_receiver`;
        - если `provider_id` отсутствует, `canCreate = false` и `reason = provider_missing`;
        - если `receiver_id` отсутствует, `canCreate = false` и `reason = receiver_missing`;
        - если `provider_id = receiver_id`, `canCreate = false` и `reason = same_provider_and_receiver`;
        - если по вычисленному контексту отзыв уже существует, `canCreate = false` и `reason = already_reviewed`.

        Вычисление контекста:
        - `items.offer_id IS NULL` -> `contextType = item-only`;
        - `items.offer_id IS NOT NULL` и `items.updated_at IS NULL` -> `contextType = offer-only`;
        - `items.offer_id IS NOT NULL` и `items.updated_at IS NOT NULL` -> `contextType = offer+item`.
      operationId: getDealItemReviewEligibility
      security:
        - bearerAuth: []
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Eligibility по item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewEligibility'
        '400':
          description: Invalid path parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Сделка или item не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/{dealId}/reviews:
