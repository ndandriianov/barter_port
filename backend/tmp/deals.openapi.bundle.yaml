      enum:
        - item-only
        - offer-only
        - offer+item
    ReviewEligibilityReason:
      type: string
      description: Машинно-стабильная причина, по которой отзыв нельзя создать.
      enum:
        - deal_not_completed
        - forbidden_not_receiver
        - receiver_missing
        - provider_missing
        - same_provider_and_receiver
        - already_reviewed
    ReviewEligibility:
      type: object
      required:
