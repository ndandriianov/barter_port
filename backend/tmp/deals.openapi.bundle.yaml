          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/failures/{dealId}/votes:
    post:
      tags:
        - Failures
      summary: Проголосовать за виновника в провале сделки
      description: |
        Голос за провал сделки и виновника.

        Если половина участников с округлением в меньшую сторону проголосует за одного и того же виновника,
        сделка будет передана на рассмотрение админа с предварительно определенным виновником.

        Округление в меньшую сторону означает, что при нечетном количестве участников,
        для признания виновным достаточно половины минус 0.5 голосов.
        Например, при 5 участниках достаточно 2 голосов, при 3 участниках достаточно 1 голоса.

        Порог считается по суммарному количеству любых голосов за провал сделки.
        Если суммарное количество голосов за провал достигло порога, по сделке создается запись в `deal_failures`,
        после чего сделка остается в текущем статусе и дальнейшие действия по ней блокируются
        до итогового решения админа.

        Голосовать можно сколько угодно раз, пока сделка находится в одном из статусов:
        Discussion, Confirmed,
        и пока по сделке нет записи в `deal_failures`, а также окончательного решения админа.

        До достижения порога голос можно изменить или отозвать.
        После достижения порога голос нельзя изменить или отозвать.

        Если половина участников проголосовали за провал сделки, но голоса распределились между несколькими кандидатами,
        сделка также передается на рассмотрение админа, но без предварительно определенного виновника.

        Проголосовать за провал может только участник сделки
      operationId: voteForFailure
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoteForFailureRequest'
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Голос успешно учтен
        '400':
          description: Некорректный запрос (пустое тело)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Операция запрещена по бизнес-правилам: пользователь не является участником сделки,
            либо статус сделки не входит в Discussion / Confirmed,
            либо по сделке уже создана запись в deal_failures,
            либо решение админа уже принято
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Сделка не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Failures
      summary: Отозвать голос за виновника в провале сделки
      description: |
        Участник сделки может отозвать свой голос за провал сделки, если он передумал или проголосовал по ошибке.

        Голос можно отозвать сколько угодно раз, пока сделка находится в одном из статусов:
        Discussion, Confirmed,
        и пока по сделке нет записи в `deal_failures`, а также окончательного решения админа.

        После достижения порога и создания записи в `deal_failures` голос отзывать нельзя.

        Отозвать голос может только участник сделки
      operationId: revokeVoteForFailure
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Голос успешно отозван
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Операция запрещена по бизнес-правилам: пользователь не является участником сделки,
            либо статус сделки не входит в Discussion / Confirmed,
            либо по сделке уже создана запись в deal_failures,
            либо решение админа уже принято
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Сделка не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Failures
      summary: Получить список голосов за виновника в провале сделки
      description: |
        Получить список голосов за виновника в провале сделки могут только участники сделки и админ

        Если голосов по сделке нет, будет возвращен пустой массив
      operationId: getFailureVotes
      parameters:
        - name: dealId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список голосов успешно получен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureVotesResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Пользователь не является участником сделки и не является админом,
            Противоречащий бизнес правилам случай сюда не относится
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Сделка не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /deals/failures/{dealId}/materials:
    get:
      tags:
        - Failures
      summary: Получить материалы по провалу сделки
      description: |
        Эндпоинт предназначен для использования только админом. Остальным возвращает 403.

        Если по сделке еще не создана запись в `deal_failures`, эндпоинт также возвращает 403.
        Если чат для сделки не был создан, поле chatId отсутствует в ответе.
      operationId: getFailureMaterials
      parameters:
