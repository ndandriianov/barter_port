        contextType:
          $ref: '#/components/schemas/ReviewContextType'
        providerId:
          nullable: true
          type: string
          format: uuid
          description: |
            Идентификатор пользователя, который будет сохранен как `review.providerId`.
            Может быть `null`, если eligibility вычислена в состоянии `provider_missing`.
        offerRef:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/OfferRef'
          description: Ссылка на offer, если отзыв затрагивает offer.
        itemRef:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DealItemRef'
          description: Ссылка на item, если отзыв затрагивает item.
        reason:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ReviewEligibilityReason'
          description: |
            Причина, по которой отзыв нельзя создать. Заполняется только если `canCreate = false`.
            Если `canCreate = true`, поле равно `null`.
    GetDealReviewsResponse:
      type: array
      items:
        $ref: '#/components/schemas/Review'
    PendingDealReview:
      type: object
      required:
