        updatedAt:
          type: string
          format: date-time
          description: Временная метка последнего обновления позиции сделки
        quantity:
          type: integer
          description: Количество позиций этого типа в сделке
        photoIds:
          type: array
          description: |
            Идентификаторы фотографий позиции сделки в том же порядке, что и `photoUrls`.
          items:
            type: string
            format: uuid
        photoUrls:
          type: array
          description: Публичные URL фотографий позиции сделки
          items:
            type: string
            format: uri
    GetDealsResponseItem:
