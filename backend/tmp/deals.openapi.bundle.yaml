          minimum: 0
          description: Количество отзывов с оценкой 2.
        rating3:
          type: integer
          minimum: 0
          description: Количество отзывов с оценкой 3.
        rating4:
          type: integer
          minimum: 0
          description: Количество отзывов с оценкой 4.
        rating5:
