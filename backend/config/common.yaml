db:
  user: "postgres"
  host: "localhost"
  port: 5432
  name: "postgres"

jwt:
  access_ttl: 10m
  refresh_ttl: 30m

kafka:
  brokers:
    - "localhost:9094"
  user_creation_topic: "auth.user-created"
  batch_size: 100
  poll_interval: 2s
  write_timeout: 10s

frontend:
  url: "http://localhost:5173"

mailer:
  host: "localhost"
  port: 2525
  user: "user"
  password: "password"
  from: "no-reply@local.test"
  tls_mode: "starttls"
  insecure_skip_verify: true
