syntax = "proto3";

package barterport.users.v1;

option go_package = "barterport/internal/contracts/grpc/users/v1;userspb";

service UsersService {
    rpc GetUsersWithInfo (GetUsersWithInfoRequest) returns (GetUsersWithInfoResponse);
    rpc ListUsers (ListUsersRequest) returns (ListUsersResponse);
    rpc ListUsersForChatCreation (ListUsersForChatCreationRequest) returns (ListUsersForChatCreationResponse);

    // Если target подписан на requester, то is_subscribed = true.
    //
    // Если при этом requester не подписан на target,
    // то данная команда подписывает requester на target и has_created_subscription = true.
    // Если же requester уже был подписан на target, то has_created_subscription = false.
    rpc CheckSubscription (CheckSubscriptionRequest) returns (CheckSubscriptionResponse);

    rpc ListSubscriptions (ListSubscriptionsRequest) returns (ListSubscriptionsResponse);
    rpc ListHiddenUsers (ListHiddenUsersRequest) returns (ListHiddenUsersResponse);
    rpc IsUserHiddenByAnyOwners (IsUserHiddenByAnyOwnersRequest) returns (IsUserHiddenByAnyOwnersResponse);

    rpc GetUserLocation (GetUserLocationRequest) returns (GetUserLocationResponse);
}

// GetUsersWithInfo
message GetUsersWithInfoRequest {
    repeated string ids = 1;
}

message UserInfo {
    string id = 1;
    string name = 2;
}

message GetUsersWithInfoResponse {
    repeated UserInfo users = 1;
}

// ListUsers
message ListUsersRequest {}

message ListUsersResponse {
    repeated UserInfo users = 1;
}

// ListUsersForChatCreation
message ListUsersForChatCreationRequest {
    string requester_user_id = 1;
}

message ListUsersForChatCreationResponse {
    repeated UserInfo users = 1;
}

// Check for bidirectional subscription
message CheckSubscriptionRequest {
    string requester_user_id = 1;
    string target_user_id = 2;
}

message CheckSubscriptionResponse {
    bool is_subscribed = 1;
    bool has_created_subscription = 2;
}

// ListSubscriptions
message ListSubscriptionsRequest {
    string user_id = 1;
}

message ListSubscriptionsResponse {
    repeated UserInfo subscriptions = 1;
}

// ListHiddenUsers
message ListHiddenUsersRequest {
    string user_id = 1;
}

message ListHiddenUsersResponse {
    repeated UserInfo users = 1;
}

// IsUserHiddenByAnyOwners
message IsUserHiddenByAnyOwnersRequest {
    string hidden_user_id = 1;
    repeated string owner_user_ids = 2;
}

message IsUserHiddenByAnyOwnersResponse {
    bool is_hidden = 1;
}

// GetUserLocation
message GetUserLocationRequest {
    string user_id = 1;
}

message GetUserLocationResponse {
    optional double latitude  = 1;
    optional double longitude = 2;
}
